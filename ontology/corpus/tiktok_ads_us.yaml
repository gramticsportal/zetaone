  # ===================== Gambling & Gaming =====================
  - id: tiktok.gambling.certification_license
    source_id: tiktok_ads_us
    category_id: gambling
    text: >
      To advertise gambling services on TikTok you must go through the
      certification process and provide documents proving your licenses and legal
      compliance in your target market. Gambling ads are only allowed in specified
      markets where gambling is legal and when all local certifications and
      requirements are met; ads promoting unlicensed or illegal gambling services
      are not allowed.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
