    source_url: "https://www.fec.gov/updates/fec-completes-action-on-seven-enforcement-cases-two-state-parties-agree-to-civil-penalties-totaling-17000/"
    date: 2007-11-19
    title: "FEC MUR 5865 — New Trier Democratic Organization inadequate disclaimers"
    summary: >
      The FEC admonished the New Trier Democratic Organization for failing to
      include adequate disclaimers on a mass mailing advocating Dan Seals' 2006
      congressional candidacy.
    why_this_matters: >
      Official FEC admonishment for missing paid-for-by disclaimers on election
      advocacy mail.
    retrieval_keywords: ['FEC', 'MUR 5865', 'disclaimer', 'New Trier Democratic Organization', 'Dan Seals', 'mass mailing']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['political']
    violated_clause_ids:
      - fec.political.disclaimer
      - meta.political.authorization_disclaimer
    canonical_ids:
      - political.authorization_and_disclaimer_required
    outcome: no_action
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The Commission admonished NTDO for failing to include adequate disclaimers
          in the communication and found no reason to believe NTDO or Dan Seals for
          Congress violated the Act by failing to report an in-kind contribution.
        source_url: https://www.fec.gov/updates/fec-completes-action-on-seven-enforcement-cases-two-state-parties-agree-to-civil-penalties-totaling-17000/
        section: "FEC Update, MUR 5865"

