        section: "CFPB Consent Order 2024-CFPB-0001, ¶15"

  - precedent_id: prec.cfpb.goldman_apple_card_2024
    source: "Consumer Financial Protection Bureau"
    source_url: "https://www.consumerfinance.gov/enforcement/actions/goldman-sachs-bank-usa/"
    date: 2024-10-23
    title: "CFPB v. Goldman Sachs — deceptive Apple Card Monthly Installments marketing"
    summary: >
      Goldman Sachs was ordered to pay $19.8 million in redress and a $45 million
      penalty after the CFPB found it misled Apple Card customers about automatic
      ACMI enrollment and refund application.
    why_this_matters: >
      Big-tech co-branded financial product ad/servicing precedent on installment
      financing disclosures.
    retrieval_keywords: ['Goldman Sachs', 'Apple Card', 'ACMI', 'installments', 'deceptive marketing', 'Apple']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial', 'misleading']
    violated_clause_ids:
      - cfpb.finance.actually_available_terms
      - cfpb.finance.trigger_terms
    canonical_ids:
      - finance.misleading_or_unbalanced_claims
      - finance.credit_advertising_trigger_terms
    outcome: consent_order
    monetary_relief: "$64,800,000 (redress + penalty)"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The Bureau found that Goldman engaged in deceptive acts or practices by
          misleading consumers to expect that purchases of Apple devices would
          automatically be enrolled in ACMI, and by misleading consumers enrolled in
          ACMI about the application of refunds to Apple Card accounts with both
          ACMI and non-ACMI balances.
        source_url: https://www.consumerfinance.gov/enforcement/actions/goldman-sachs-bank-usa/
        section: "CFPB Enforcement Action Summary"
