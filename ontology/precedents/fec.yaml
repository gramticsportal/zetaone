  - precedent_id: prec.fec.miller_defective_disclaimer_2010
    source: "U.S. Federal Election Commission"
    source_url: "https://www.fec.gov/updates/fec-takes-final-action-on-six-cases-12/"
    date: 2010-08-31
    title: "FEC MUR 6274 — Matt Miller committee defective disclaimers"
    summary: >
      The FEC dismissed a complaint against Matt Miller's Ohio congressional
      committee for defective disclaimers but sent a reminder letter about 2
      U.S.C. § 441d and 11 C.F.R. § 110.11 disclaimer requirements.
    why_this_matters: >
      Illustrates FEC prosecutorial discretion on defective disclaimer materials
      while reaffirming statutory disclaimer rules.
    retrieval_keywords: ['FEC', 'MUR 6274', 'Matt Miller', 'defective disclaimer', 'Ohio', '441d']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['political']
    violated_clause_ids:
      - fec.political.disclaimer
    canonical_ids:
      - political.authorization_and_disclaimer_required
    outcome: no_action
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The Commission sent a letter to the respondents, reminding them of the
          requirements under 2 U.S.C. § 441d and 11 C.F.R. § 110.11 concerning the
          use of appropriate disclaimers.
        source_url: https://www.fec.gov/updates/fec-takes-final-action-on-six-cases-12/
        section: "FEC Update, MUR 6274"

