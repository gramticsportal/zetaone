        tobacco, nicotine, or related products. ... Cigarettes, cigars, tobacco or
        nicotine, and related products, e-cigarettes, vape pens or vape oils and
        cartridges, or any other alternative to smoking or consumption of tobacco
        and nicotine. Smoking paraphernalia, such as smoking pipes, rolling
        papers, filters, vaporizers, nicotine pouches.
      source_url: https://ads.tiktok.com/help/article/tiktok-ads-policy-dangerous-products-or-services
