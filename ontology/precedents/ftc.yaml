  date: 2011-09-28
  title: FTC v. Reebok — unsubstantiated EasyTone toning-shoe claims
  summary: 'The FTC charged Reebok with making unsupported claims that walking in EasyTone shoes would strengthen and tone leg and buttock muscles more than ordinary shoes. Reebok agreed to pay $25 million in consumer refunds.

    '
