  # ===================== Misleading / Deceptive =====================
  - id: tiktok.misleading.absolute_terms
    source_id: tiktok_ads_us
    category_id: misleading
    text: >
      Ad content must not feature absolute terms about a product in relation to
      time, region, or brand, or promise/exaggerate results. Prohibited examples
      include "Get slim legs right away" and financial claims such as "Get money
      in 10 seconds."
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08"
    status: active
    last_verified_at: 2026-06-24
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [all]
    evidence:
