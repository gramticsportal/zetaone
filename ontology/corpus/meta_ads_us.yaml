        Ads can't use the image of a famous person and misleading tactics in
        order to bait people into engaging with an ad.
      source_url: https://transparency.meta.com/policies/ad-standards/fraud-scams/unacceptable-business-practices
      section: "Fraud & Scams > Unacceptable Business Practices"
      retrieved_at: 2026-06-24

  - id: meta.misleading.misrepresent_entity
    source_id: meta_ads_us
    category_id: misleading
    text: >
      Ads can't promise financial benefits by misrepresenting an entity,
      industry association or news outlet to mislead people or ask them to share
      sensitive information.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-05-01
    version: "2025-05-01"
    status: active
    last_verified_at: 2026-06-24
    last_reviewed_by: ai
