# Platform policy enforcement precedents (official transparency/policy pages).

precedents:
  - precedent_id: prec.meta.siep_disclaimer_enforcement_2024
    source: "Meta Transparency Center"
    source_url: "https://transparency.meta.com/sr/european-parliament-report-2024"
    date: 2024-06-23
    title: "Meta SIEP policy — mass removal of non-compliant political ads (EU 2024)"
    summary: >
      Meta reported removing over 130,000 social-issue/election/political ads in
      the EU for SIEP policy non-compliance during the 2024 European Parliament
      election period while labeling 400,000+ compliant ads.
    why_this_matters: >
      Documents platform-scale enforcement of paid-for-by and authorization
      requirements on political ads.
    retrieval_keywords: ['Meta', 'SIEP', 'political ads', 'Paid for by', 'Ad Library', 'EU elections', 'disclaimer']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['political']
    violated_clause_ids:
      - meta.political.authorization_disclaimer
    canonical_ids:
      - political.authorization_and_disclaimer_required
    outcome: suspension
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          As a result of the above policies and measures, around the EP elections,
          we labelled over 400,000 SIEP ads in the EU, and we removed over 130,000
          SIEP ads in the EU for non-compliance with Meta's SIEP policy.
        source_url: https://transparency.meta.com/sr/european-parliament-report-2024
        section: "Meta EP Post-Elections Report 2024"

  - precedent_id: prec.google.election_ads_disclosure_2024
    source: "Google Ads Policy"
    source_url: "https://support.google.com/adspolicy/answer/6014595?hl=en"
    date: 2024-01-01
    title: "Google election ads — mandatory Paid for by disclosure and verification"
    summary: >
      Google requires verified election advertisers in covered regions to include
      a Paid for by disclosure, auto-generated for most formats, with advertiser
      verification and transparency reporting.
    why_this_matters: >
      Primary platform rule cited when rejecting or verifying U.S. election and
      issue ads lacking disclaimers.
    retrieval_keywords: ['Google Ads', 'election ads', 'Paid for by', 'verification', 'political content', 'disclosure']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['political']
    violated_clause_ids:
      - google.political.paid_for_by
      - google.political.compliance_verification
    canonical_ids:
      - political.authorization_and_disclaimer_required
    outcome: guidance
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          All election ads run by verified election advertisers in regions where
          election ads verification is required must contain a disclosure that
          identifies who paid for the ad.
        source_url: https://support.google.com/adspolicy/answer/6014595?hl=en
        section: "Google Ads Policy — Political content"

  - precedent_id: prec.meta.ip_counterfeit_enforcement_2024
    source: "Meta Transparency Center"
    source_url: "https://transparency.meta.com/policies/ad-standards/intellectual-property-infringement/third-party-infringement"
    date: 2024-08-26
    title: "Meta ad policy — counterfeit goods rejection and proactive IP enforcement"
    summary: >
      Meta prohibits ads promoting counterfeit goods and may reject or remove ads
      reported by rights holders or flagged for potential third-party IP
      infringement.
    why_this_matters: >
      Platform IP enforcement standard for ad rejection of counterfeit and
      infringing listings.
    retrieval_keywords: ['Meta', 'counterfeit', 'intellectual property', 'ad rejection', 'trademark', 'Facebook ads']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['ip_trademark']
    violated_clause_ids:
      - meta.ip.counterfeit_goods
      - meta.ip.third_party_infringement
    canonical_ids:
      - ip.counterfeit_goods_prohibited
      - ip.third_party_ip_infringement_prohibited
    outcome: guidance
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Ads may not contain content that violates the intellectual property rights
          of any third party, including copyright, trademark or other legal rights.
          This includes, but is not limited to, the promotion or sale of counterfeit
          goods.
        source_url: https://transparency.meta.com/policies/ad-standards/intellectual-property-infringement/third-party-infringement
        section: "Third-Party Intellectual Property Infringement policy"

  - precedent_id: prec.meta.gambling_authorization_2024
    source: "Meta Advertising Standards"
    source_url: "https://transparency.meta.com/policies/ad-standards/restricted-goods-services/gambling-games/"
    date: 2024-01-01
    title: "Meta online gambling ads — authorization and licensing required"
    summary: >
      Meta requires written authorization before running real-money online
      gambling ads and proof that activities are licensed or lawful in targeted
      territories.
    why_this_matters: >
      Core Meta gate for sportsbook and casino ad accounts in permitted US states.
    retrieval_keywords: ['Meta', 'online gambling', 'sports betting', 'ad authorization', 'license', 'Facebook ads']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['gambling']
    violated_clause_ids:
      - meta.gambling.authorization_and_license
      - meta.gambling.no_minors
    canonical_ids:
      - gambling.realmoney_requires_license_and_authorization
      - gambling.no_minors_targeting
    outcome: guidance
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Ads that promote online gambling and gaming are only allowed once an ad
          account has obtained authorization. Advertisers will need to request
          authorization from Meta through the Authorizations and Verifications tab
          in Meta Business Suite and provide evidence that the gambling activities
          are appropriately licensed by a regulator or otherwise established as
          lawful in the territory they want to target.
        source_url: https://transparency.meta.com/policies/ad-standards/restricted-goods-services/gambling-games/
        section: "Restricted Goods and Services > Online Gambling and Games"

  - precedent_id: prec.google.repeat_violation_strikes_2024
    source: "Google Ads Policy"
    source_url: "https://support.google.com/adspolicy/answer/10922738"
    date: 2024-01-01
    title: "Google Ads — strike system for repeat policy violations"
    summary: >
      Google issues up to three strikes for repeat violations of certain policies,
      with 3- and 7-day account holds followed by suspension on the third strike.
    why_this_matters: >
      Official Google escalation path for repeat misleading, counterfeit, or
      restricted-category ad violations.
    retrieval_keywords: ['Google Ads', 'strikes', 'repeat violations', 'account suspension', 'policy enforcement']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['misleading']
    violated_clause_ids:
      - google.misrep.unacceptable_business_practices
      - google.ip.counterfeit_goods
    canonical_ids:
      - misleading.unsubstantiated_objective_claims
      - ip.counterfeit_goods_prohibited
    outcome: suspension
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          We take repeat violations of our policies seriously and take action
          against advertisers for non-compliance, including disapproving violating
          ads so they don't serve, as well as suspending accounts for repeat or
          egregious violations.
        source_url: https://support.google.com/adspolicy/answer/10922738
        section: "About enforcement procedures for repeat violations"

