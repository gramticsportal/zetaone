  - precedent_id: prec.ftc.chegg_data_security_2023
    source: "U.S. Federal Trade Commission"
    source_url: "https://www.ftc.gov/news-events/news/press-releases/2023/01/ftc-finalizes-order-ed-tech-provider-chegg-lax-security-exposed-student-data"
    date: 2023-01-26
    title: "FTC v. Chegg — student data breaches and retention failures"
    summary: >
      The FTC finalized an order against Chegg for lax security that exposed
      sensitive data of about 40 million users and employees across four breaches,
      requiring data minimization and user deletion rights.
    why_this_matters: >
      Ed-tech precedent for data minimization and deletion obligations relevant to
      ad-tech data pipelines targeting students.
    retrieval_keywords: ['Chegg', 'student data', 'data breach', 'edtech', 'privacy', 'scholarship data', 'retention']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['privacy', 'minors']
    violated_clause_ids:
      - tiktok.privacy.data_collection_disclosure
    canonical_ids:
      - privacy.data_collection_disclosure_required
    outcome: consent_order
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Chegg failed to protect the personal information it collected from users
          and employees. For example, the company stored users' personal data on its
          cloud storage databases in plain text and, until at least 2018, employed
          outdated and weak encryption to protect user passwords.
        source_url: https://www.ftc.gov/news-events/news/press-releases/2023/01/ftc-finalizes-order-ed-tech-provider-chegg-lax-security-exposed-student-data
        section: "FTC Press Release, Jan 26, 2023"

  - precedent_id: prec.ftc.intuit_turbotax_free_2022
    source: "U.S. Federal Trade Commission"
    source_url: "https://www.ftc.gov/system/files/ftc_gov/pdf/intuit_initial_decision_public_redacted_1.pdf"
    date: 2022-05-04
    title: "FTC v. Intuit — deceptive TurboTax 'free' filing campaign"
    summary: >
      The FTC found Intuit deceptively marketed TurboTax as free for all consumers
      when only some filers qualified, following a parallel $141 million
      multistate settlement restricting 'Free, Free, Free' ads.
    why_this_matters: >
      Canonical 'free' offer deception case for financial and lead-gen ads with
      hidden eligibility gates.
    retrieval_keywords: ['Intuit', 'TurboTax', 'free filing', 'deceptive advertising', 'dark patterns', 'tax prep']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial', 'misleading']
    violated_clause_ids:
      - ftc.misleading.reasonable_basis
      - cfpb.finance.actually_available_terms
    canonical_ids:
      - finance.misleading_or_unbalanced_claims
      - misleading.unsubstantiated_objective_claims
    outcome: consent_order
    monetary_relief: "$141,000,000 (multistate consumer redress, parallel)"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The Complaint alleges that Respondent repeatedly claimed through various
          advertising channels that consumers could file their taxes for free using
          TurboTax, when in fact, TurboTax is free for only some consumers, based on
          the tax filing forms used.
        source_url: https://www.ftc.gov/system/files/ftc_gov/pdf/intuit_initial_decision_public_redacted_1.pdf
        section: "FTC Initial Decision, D09408 (public redacted)"

