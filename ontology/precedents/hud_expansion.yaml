# HUD fair housing advertising enforcement.

precedents:
  - precedent_id: prec.hud.facebook_housing_ads_2019
    source: "U.S. Department of Housing and Urban Development"
    source_url: "https://archives.hud.gov/news/2019/pr19-035.cfm"
    date: 2019-03-28
    title: "HUD charge — Facebook housing ad discrimination (supplement to DOJ settlement)"
    summary: >
      HUD charged Facebook with violating the Fair Housing Act by enabling
      advertisers to exclude audiences by race, religion, familial status, and
      other protected classes in housing ads.
    why_this_matters: >
      Foundational FHA charge on targeted housing advertising that preceded the
      DOJ/HUD Meta settlement already in corpus.
