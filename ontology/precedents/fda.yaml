- precedent_id: prec.fda.opioid_marketing_2020
  source: U.S. Food and Drug Administration + FTC (warning letters)
  source_url: https://www.fda.gov/news-events/press-announcements/fda-and-ftc-warn-companies-selling-fraudulent-covid-19-products
  date: 2020-03-09
  title: FDA/FTC joint warning letters — fraudulent COVID-19 treatment claims
  summary: 'The FDA and FTC issued joint warning letters to seven companies for selling fraudulent COVID-19 products — including teas, essential oils, and colloidal silver — with claims that the products could treat or prevent COVID-19. The agencies demanded immediate cessation of unlawful claims.

    '
