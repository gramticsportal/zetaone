- precedent_id: prec.fda.juul_marketing_denial_2022
  source: U.S. Food and Drug Administration
  source_url: https://www.fda.gov/news-events/press-announcements/fda-denies-authorization-market-juul-products
  date: 2022-06-23
  title: FDA marketing denial orders — JUUL e-cigarette products
  summary: 'The FDA issued marketing denial orders (MDOs) for all JUUL products then on the U.S. market, finding the applications lacked sufficient evidence that marketing the products would be appropriate for the protection of public health, citing concerns about toxicological data. FDA later administratively stayed and rescinded the MDOs for additional scientific review; MGOs were ultimately granted in 2025 for some products.

    '
  category_ids:
  - drugs
  violated_clause_ids:
  - fda.atc.tobacco_format
  - meta.atc.tobacco
  canonical_ids:
  - atc.tobacco_and_nicotine_ads_prohibited
  outcome: marketing_denial
  monetary_relief: Products must stop sale/distribution absent authorization (MDO)
  status: rescinded
  jurisdiction: US
  retrieved_at: 2026-06-27
  evidence:
  - quote: Today, the U.S. Food and Drug Administration issued marketing denial orders (MDOs) to JUUL Labs Inc. for all of their products currently marketed in the United States. As a result, the company must stop selling and distributing these products.
    source_url: https://www.fda.gov/news-events/press-announcements/fda-denies-authorization-market-juul-products
    section: FDA Press Announcement, June 23, 2022
  why_this_matters: FDA marketing denial order removing JUUL products for lack of authorization.
