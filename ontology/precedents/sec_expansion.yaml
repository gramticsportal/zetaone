# SEC enforcement precedents — Phase 1 expansion.

precedents:
  - precedent_id: prec.sec.paul_pierce_crypto_2023
    source: "U.S. Securities and Exchange Commission"
    source_url: "https://www.sec.gov/newsroom/press-releases/2023-34"
    date: 2023-02-17
    title: "SEC v. Paul Pierce — undisclosed crypto touting and misleading tweets"
    summary: >
      Paul Pierce settled SEC charges for promoting EMAX tokens without disclosing
      $244,000+ in compensation and for misleading tweets about his holdings,
      paying $1.409 million total.
    why_this_matters: >
      High-profile influencer/crypto ad disclosure case under securities anti-
      touting rules.
    retrieval_keywords: ['Paul Pierce', 'crypto', 'EMAX', 'influencer', 'undisclosed payment', 'touting', 'Twitter']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial', 'misleading']
    violated_clause_ids:
      - sec.finance.testimonials
      - sec.finance.untrue_or_unbalanced
    canonical_ids:
      - finance.testimonials_endorsements_disclosure
      - finance.misleading_or_unbalanced_claims
    outcome: settlement
    monetary_relief: "$1,409,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The SEC's order finds that Pierce failed to disclose that he was paid more
          than $244,000 worth of EMAX tokens to promote the tokens on Twitter.
        source_url: https://www.sec.gov/newsroom/press-releases/2023-34
        section: "SEC Press Release 2023-34"

  - precedent_id: prec.sec.lindsay_lohan_crypto_2023
    source: "U.S. Securities and Exchange Commission"
    source_url: "https://www.sec.gov/files/litigation/admin/2023/33-11173.pdf"
    date: 2023-03-22
    title: "SEC v. Lindsay Lohan — undisclosed TRX crypto promotion"
    summary: >
      Lindsay Lohan settled SEC charges for promoting Tronix (TRX) on Twitter
      without disclosing $10,000 compensation from the issuer.
    why_this_matters: >
      Celebrity paid-promotion disclosure template for crypto and fintech social
      ads.
    retrieval_keywords: ['Lindsay Lohan', 'TRX', 'Tron', 'crypto touting', 'Section 17(b)', 'influencer disclosure']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial', 'misleading']
    violated_clause_ids:
      - sec.finance.testimonials
    canonical_ids:
      - finance.testimonials_endorsements_disclosure
    outcome: settlement
    monetary_relief: "$40,670 (disgorgement, interest, penalty)"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Lohan did not disclose that she was being paid to give publicity to such
          security by the entity offering and selling it to the public.
        source_url: https://www.sec.gov/files/litigation/admin/2023/33-11173.pdf
        section: "SEC Admin Proceeding 33-11173"

