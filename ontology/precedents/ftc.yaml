  monetary_relief: $25,000,000 consumer refunds
  status: final
  jurisdiction: US
  retrieved_at: 2026-06-27
  evidence:
  - quote: Reebok made unsupported claims in advertisements that walking in its EasyTone shoes and running in its RunTone running shoes strengthen and tone key leg and buttock muscles more than regular shoes.
    source_url: https://www.ftc.gov/news-events/news/press-releases/2011/09/reebok-settles-ftc-charges-advertising-toning-shoes-can-make-you-fitter
    section: FTC Press Release, Sept 28, 2011
