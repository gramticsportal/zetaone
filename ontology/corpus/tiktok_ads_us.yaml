        Examples of what is not allowed: Get-rich-quick offers; Pyramid schemes;
        Too-good-to-be-true financial offers.
      source_url: https://ads.tiktok.com/help/article/tiktok-ads-policy-financial-services
      section: "Advertising Policies > Financial Services > Policy > Examples of what is not allowed"
      retrieved_at: 2026-06-27

  - id: tiktok.finance.us_allowed
    source_id: tiktok_ads_us
    category_id: financial
    text: >
      In the United States, ads for financial services and products may be
      allowed if they comply with relevant laws, comply with disclosure
      requirements (including disclaimers; evidence of appropriate regulator and
      third-party accreditations or certifications may be required), are licensed
      by local and regional authorities, and are restricted to viewers aged 18
      years and older. Examples of what may be allowed: cryptocurrencies; the
      exchange, management, or investment of funds (fiat or virtual); loans;
      non-fungible tokens (NFTs) (without implying NFTs are an investment or
      tradable); and virtual currencies.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        Ads for financial services and products may be allowed if the following
        requirements are met: Comply with relevant laws and regulations; Comply
        with disclosure requirements, including disclaimers, disclosure and
        evidence of appropriate regulator and third-party accreditations or
        certifications may be required; Be licensed by local and regional
        authorities; Restrict ads to viewers aged 18 years and older. Examples of
        what may be allowed: Cryptocurrencies; The exchange, management, or
        investment of funds, such as fiat or virtual; Loans; Non-fungible tokens
        (NFTs)* [*Do not imply that NFTs are a form of investment or that they
        can be traded in the market]; Virtual currencies.
      source_url: https://ads.tiktok.com/help/article/tiktok-ads-policy-financial-services
      section: "Advertising Policies > Financial Services > Market-specific requirements > Canada, United States of America > Examples of what may be allowed"
      retrieved_at: 2026-06-27

  - id: tiktok.finance.us_prohibited
    source_id: tiktok_ads_us
    category_id: financial
    text: >
      In the United States, ads are not allowed for: bail bonds; complex
      speculative investments such as contracts for differences (CFDs), financial
      spread betting, penny stocks, binary options, and mini-bonds; credit repair
      services; cryptocurrency ATMs; cryptocurrency mining devices;
      get-rich-quick schemes; initial coin offerings (ICOs); payday loans;
      pawnbroker loans; penny auctions; precious metals trading; pyramid schemes;
      single securities; and unaccredited digital banks mimicking traditional
      bank functions.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        Examples of what is not allowed: Bail bonds; Complex speculative
        investments such as contracts for differences (CFDs), financial spread
        betting, penny stocks, binary options, and mini-bonds; Credit repair
        services; Cryptocurrency ATMs; Cryptocurrency mining devices;
        Get-rich-quick schemes; Initial coin offerings (ICOs); Payday loans;
        Pawnbroker loans; Penny auctions; Precious metals trading; Pyramid
        schemes; Single securities; Unaccredited digital banks mimicking
        traditional bank functions.
      source_url: https://ads.tiktok.com/help/article/tiktok-ads-policy-financial-services
      section: "Advertising Policies > Financial Services > Market-specific requirements > Canada, United States of America > Examples of what is not allowed"
      retrieved_at: 2026-06-27

  # ===================== Housing & Employment (discrimination) =====================
  - id: tiktok.discrimination.anti_discrimination
    source_id: tiktok_ads_us
    category_id: discrimination
    text: >
      TikTok's Housing, Employment, and Credit (HEC) Ad Policy is designed to
      ensure compliance with anti-discrimination laws and to prevent the platform
      from being used to exclude people from essential opportunities based on
      protected characteristics. This HEC Ad Policy is in addition to TikTok's
      existing Anti-Discrimination Ad Policy that prohibits unlawful
      discrimination, including through the use of Custom Audiences or other tools
      and audiences available on the platform.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08-hec"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [discrimination]
    evidence:
      quote: >-
        TikTok's Housing, Employment, and Credit (HEC) Ad Policy is designed to
        ensure compliance with anti-discrimination laws and to prevent the
        platform from being used to exclude people from essential opportunities
        based on protected characteristics. ... This HEC Ad Policy is in addition
        to existing Anti-Discrimination Ad Policy that prohibits unlawful
        discrimination, including without limitation, through the use of Custom
        Audiences or the use of other tools and audiences available on our
        platform.
      source_url: https://ads.tiktok.com/help/article/housing-employment-credit-hec-ad-policy
      section: "Housing, Employment, and Credit (HEC) Ad Policy"
      retrieved_at: 2026-06-27

  - id: tiktok.discrimination.hec_targeting
    source_id: tiktok_ads_us
    category_id: discrimination
    text: >
      Advertisers based in the United States, or advertisers targeting audiences
      in the United States or Canada, must use the Special Ad Category Toggle to
      self declare when they are running housing, employment or credit ads, which
      automatically removes restricted targeting options. In the United States
      and Canada, housing, employment, and credit ads cannot target audiences
      using marital or parental status, or any options describing or appearing to
      relate to protected characteristics (including key words that have a high
      correlation to protected categories).
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08-hec"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [discrimination]
    evidence:
      quote: >-
        Advertisers based in the United States, or advertisers targeting
        audiences in the United States or Canada must use the Special Ad Category
        Toggle to self declare when they are running housing, employment or
        credit ads. ... In the United States and Canada, housing, employment, and
        credit ads cannot target audiences using the following categories: ...
        Marital or parental status ... Any options describing or appearing to
        relate to protected characteristics (this may include key words that have
        a high correlation to protected categories).
      source_url: https://ads.tiktok.com/help/article/housing-employment-credit-hec-ad-policy
      section: "Housing, Employment, and Credit (HEC) Ad Policy > Special Ad Category Toggle"
      retrieved_at: 2026-06-27

  # ===================== Political & Social Issues =====================
  - id: tiktok.political.prohibited
    source_id: tiktok_ads_us
    category_id: political
    text: >
      TikTok does not allow paid political advertising, including ads that
      promote or oppose a candidate, current leader, political party or group, or
      issue at the federal, state, or local level (including election-related,
      advocacy, or issue ads). It also prohibits advertising of any kind by
      political figures and entities, and bans paid political promotion across
      all monetization features, including creators being compensated for branded
      political content and tools such as Promote. Only official entities
      responsible for overseeing elections may advertise about elections or
      referendums.
    modalities: [text, image, video, audio, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08-politics"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [political]
    evidence:
      quote: >-
        We do not allow paid political advertising because the nature of
        political ads is not something we believe fits the TikTok experience. In
        addition to our paid political advertising policy, we prohibit
        advertising of any kind by political figures and entities. ... Only
        official entities responsible for overseeing elections are eligible to
        advertise about elections or referendums. References to an upcoming or
        current election or referenda, including appeals for votes, voter
        registration, and promoting participation, are prohibited for all other
        advertisers. ... We do not allow paid political advertising across any of
        our monetization features, including paid ads, creators being compensated
        for making branded political content, and the use of other promotional
        tools on the platform, such as Promote.
      source_url: https://ads.tiktok.com/help/article/tiktok-ads-policy-politics-government-and-elections
      section: "Advertising Policies > Politics, Governments, and Elections"
      retrieved_at: 2026-06-27

  # ===================== Children / Minors =====================
  - id: tiktok.minors.targeting_limited_under_18
    source_id: tiktok_ads_us
    category_id: minors
    text: >
      Some targeting and campaign options are not available when an audience
      includes people under 18 in certain locations; TikTok limits advertisers'
      ability to target users under 18 in the U.S., Canada, the EEA, the UK,
      Switzerland and Latin America. Detailed (interest/behavior) targeting is
      not available when the audience includes people under 18, and the Sales –
      TikTok Shop objective is unavailable for under-18 audiences.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-04-01
    version: "2025-04-age-targeting"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [minors]
      industries: [minors]
    evidence:
      quote: >-
        Some targeting and campaign options are not available when you create ad
        campaigns including audiences under the age of 18 in certain locations.
        ... we have taken steps to limit the ability of advertisers to target
        users under the age of 18 in the U.S., Canada, the European Economic Area
        (EEA), the UK, Switzerland and Latin America. ... The following detailed
        targeting options will not be available when your audience includes
        people under the age of 18 ... [and] The following advertising objectives
        will not be available when reaching people under the age of 18: Sales -
        TikTok Shop.
      source_url: https://ads.tiktok.com/help/article/about-advertising-to-people-under-the-age-of-18
      section: "About TikTok advertising restrictions for people under the age of 18"
      retrieved_at: 2026-06-27

  - id: tiktok.minors.age_restricted_not_to_minors
    source_id: tiktok_ads_us
    category_id: minors
    text: >
      TikTok restricts a non-exhaustive list of content categories from being
      targeted based on user age; for example, advertisements for alcoholic
      products or other alcohol-related products or services are not allowed to
      target audiences under the legal drinking age. Advertisers must follow
      local legal requirements on advertising to users under 18 and all of
      TikTok's ad policies.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "protecting-minors-initiatives"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [minors]
      industries: [minors]
    evidence:
      quote: >-
        The following is a non-exhaustive list of some notable content categories
        that we restrict from targeting based on user age: Advertisements for
        alcoholic products or other alcohol-related products or services are not
        allowed to target audiences under the legal drinking age. ... We expect
        all of our advertisers to follow local legal requirements when creating
        ad campaigns, including any regulations on advertising to users under the
        age of 18, as well as all of TikTok's Ads policies.
      source_url: https://ads.tiktok.com/help/article/protecting-minors-on-tiktok-advertising-initiatives
      section: "Protecting minors on TikTok: advertising initiatives"
      retrieved_at: 2026-06-27

  # ===================== Privacy & Personal Data =====================
  - id: tiktok.privacy.data_collection_disclosure
    source_id: tiktok_ads_us
    category_id: privacy
    text: >
      Advertisers must clearly disclose any data collection, sharing, and usage
      that takes place on their landing page through the use of a privacy policy.
      Advertisers may not distribute malicious software, or undisclosed/unwanted
      software, including software that collects or transmits user information
      without the user's knowledge or that is difficult to remove.
    modalities: [landing_page]
    jurisdiction: [US]
    effective_date: 2025-02-01
    version: "2025-02-data-collection-standards"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [privacy]
    evidence:
      quote: >-
        Advertisers must clearly disclose any data collection, sharing, and usage
        that takes place on their Landing Page through the use of a privacy
        policy. Advertisers are not allowed to distribute malicious software that
        may harm or gain unauthorized access to a computer, device, or network.
