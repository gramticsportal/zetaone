- precedent_id: prec.hud.facebook_housing_charge_2019
  source: U.S. Department of Housing and Urban Development
  source_url: https://www.hud.gov/press/press_releases_media_advisories/HUD_No_19_035
  date: 2019-03-28
  title: HUD Charge of Discrimination — Meta housing ad delivery system
  summary: 'HUD charged Facebook (Meta) with housing discrimination under the Fair Housing Act, alleging its ad platform enabled advertisers to exclude people from housing ads based on race, color, religion, sex, familial status, national origin, and disability — and that Facebook''s ad delivery system further discriminated by showing ads based on those characteristics.

    '
