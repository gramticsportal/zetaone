- canonical_id: ip.counterfeit_goods_prohibited
  category_id: ip_trademark
  severity: high
  review_status: approved
  source_rule_ids:
  - google_ip_counterfeit
  - meta_ip_counterfeit
  - tiktok_ip_counterfeit
  source_files:
  - google_ads_us.yaml
  - meta_ads_us.yaml
  - tiktok_ads_us.yaml
  clause_ids:
  - google.ip.counterfeit_goods
  - meta.ip.counterfeit_goods
  - tiktok.ip.counterfeit_goods
  modalities:
  - text
  - image
  - video
  - landing_page
  detection_summaries:
  - ad or website/app selling or promoting counterfeit goods — products with a trademark/logo identical
    to or substantially indistinguishable from another's, mimicking brand features to pass as genuine
    (incl. "knock off", "replica", "fake", etc.).
  - ads or landing pages promoting/selling counterfeits, knockoffs, or replicas that copy another company's
    trademark (name/logo) or distinctive features to imitate a genuine product.
  - ads that purchase/sell/trade/promote/solicit counterfeit goods — goods under a trademark identical
    or substantially similar to a registered mark without the owner's permission.
  forbidden_terms:
  - website
  - selling
  - counterfeit
  - goods
  - trademark
  - logo
  - identical
  - substantially
  - indistinguishable
  - another's
  - mimicking
  - display
  - video
  - prohibit
  - sale
  - landing
  - pages
  - counterfeits
  forbidden_phrases:
  - fake designer
  - replica handbags
  - counterfeit goods
  forbidden_patterns:
  - pattern: \b(replica|counterfeit|knock[\s-]?off|fake)\s+\w+
    confidence: 0.85
    note: counterfeit goods
  requires_context:
    terms:
    - brand
    - logo
    - trademark
    - designer
    - replica
    note: 'Gate: prefer match when context terms appear near hit'
  exceptions:
    terms:
    - results may vary
    - for entertainment
    - informational only
    - no real money
    phrases: []
    patterns: []
    notes: []
  vision_labels:
  - counterfeit
  - fake logo
  - replica handbag
  - luxury handbag
  - trademark
  - that
  - goods
  - rights
  vision_min_confidence: 0.55
  embedding_prototypes:
