        source_url: https://www.sec.gov/newsroom/press-releases/2024-73
        section: "SEC Press Release 2024-73"

  - precedent_id: prec.sec.kraken_staking_2023
    source: "U.S. Securities and Exchange Commission"
    source_url: "https://www.sec.gov/files/litigation/complaints/2023/comp-pr2023-25.pdf"
    date: 2023-02-09
    title: "SEC v. Kraken — unregistered crypto staking-as-a-service"
    summary: >
      Kraken agreed to pay $30 million and cease its U.S. staking program after
      the SEC charged it with offering and selling an unregistered investment
      contract through pooled crypto staking services.
    why_this_matters: >
      Defines staking-as-a-service as securities offering — core crypto
      yield/advertising compliance precedent.
    retrieval_keywords: ['Kraken', 'staking', 'crypto yield', 'unregistered securities', 'proof of stake', '$30 million']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial']
    violated_clause_ids:
      - sec.finance.untrue_or_unbalanced
      - google.finance.crypto
    canonical_ids:
      - finance.crypto_restricted
      - finance.misleading_or_unbalanced_claims
    outcome: settlement
    monetary_relief: "$30,000,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          This case concerns the illegal unregistered offer and sale of securities
          involving the staking of crypto assets.
        source_url: https://www.sec.gov/files/litigation/complaints/2023/comp-pr2023-25.pdf
        section: "SEC Complaint, Case 3:23-cv-00588, SUMMARY ¶1"

  - precedent_id: prec.sec.impact_theory_nfts_2023
    source: "U.S. Securities and Exchange Commission"
    source_url: "https://www.sec.gov/files/litigation/admin/2023/33-11226.pdf"
    date: 2023-08-28
    title: "SEC v. Impact Theory — unregistered NFT securities offering"
    summary: >
      Impact Theory agreed to a cease-and-desist order after the SEC found it
      raised about $29.9 million selling Founder's Keys NFTs as unregistered
      investment contracts with profit expectations tied to the company's efforts.
    why_this_matters: >
      First major SEC NFT-as-securities case — applies to crypto/NFT project
      marketing and influencer promotions.
    retrieval_keywords: ['Impact Theory', 'NFT', "Founder's Keys", 'unregistered offering', 'Howey', 'crypto art']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial', 'misleading']
    violated_clause_ids:
      - sec.finance.untrue_or_unbalanced
      - google.finance.crypto
    canonical_ids:
      - finance.crypto_restricted
      - misleading.unsubstantiated_objective_claims
    outcome: consent_order
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          From October 13, 2021, to December 6, 2021, Impact Theory, a media and
          entertainment company, offered and sold crypto asset securities known as
          Founder's Keys in the form of purported non-fungible tokens, raising
          approximately $29.9 million worth of ether from at least hundreds of
          investors, including investors across the United States.
        source_url: https://www.sec.gov/files/litigation/admin/2023/33-11226.pdf
        section: "SEC Admin Proceeding 33-11226"

  - precedent_id: prec.sec.stoner_cats_nfts_2023
    source: "U.S. Securities and Exchange Commission"
    source_url: "https://www.sec.gov/files/litigation/admin/2023/33-11233.pdf"
