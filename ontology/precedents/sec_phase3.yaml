      - quote: >-
          On July 27, 2021, Stoner Cats 2, LLC ("SC2") conducted an unregistered
          offering of crypto asset securities in the form of non-fungible tokens
          called Stoner Cats (hereinafter "Stoner Cats NFTs" or "NFTs"). SC2 offered
          and sold to the public, including U.S. investors, 10,320 NFTs for 0.35 ETH
          (approximately $800) each.
        source_url: https://www.sec.gov/files/litigation/admin/2023/33-11233.pdf
