# Evaluation dataset — Misleading + Health + Financial + Housing/Employment +
# Political/Social-Issues verticals.
# 270 examples total:
#   Misleading:           30 (10 non_compliant, 10 compliant, 10 borderline)
#   Health:               60 (20 non_compliant, 20 compliant, 20 borderline)
#   Financial:            60 (20 non_compliant, 20 compliant, 20 borderline)
#   Housing/Employment:   60 (20 non_compliant, 20 compliant, 20 borderline)
#   Political:            60 (20 non_compliant, 20 compliant, 20 borderline)
# Labeled examples linked to clauses/categories. Compute precision/recall PER
# category_id and PER canonical_id from these. Conforms to entities.example.
# labeled_by: expert here = seed authoring; replace with reviewed labels as the
# set grows and add inter-annotator agreement before quoting metrics externally.

