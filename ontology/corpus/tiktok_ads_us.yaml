        Ad content must not feature absolute terms about a product in relation to
        time, region, or brand, or promise/exaggerate results. Prohibited
        examples include "Get slim legs right away" and financial claims such as
        "Get money in 10 seconds."
      source_url: https://ads.tiktok.com/help/article/misleading-false-content
      section: "Advertising Policies > Misleading and false content"
      retrieved_at: 2026-06-24

  - id: tiktok.misleading.before_after
    source_id: tiktok_ads_us
    category_id: misleading
    text: >
      Before-and-after imagery showing physical transformation is prohibited in
      paid ads — for example, showing wrinkles disappearing through
      before-and-after comparisons. Applies to weight loss, skincare, muscle
      gain, hair growth, and similar transformation claims.
    modalities: [image, video]
    jurisdiction: [US]
    effective_date: 2026-02-12
    version: "2026-02"
    status: active
    last_verified_at: 2026-06-24
