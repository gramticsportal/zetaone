# State Attorney General enforcement precedents.

precedents:
  - precedent_id: prec.nyag.juul_youth_marketing_2023
    source: "New York State Attorney General"
    source_url: "https://ag.ny.gov/press-release/2023/attorney-general-james-secures-462-million-juul-its-role-youth-vaping-epidemic"
    date: 2023-04-12
    title: "NY AG multistate settlement — JUUL youth-targeted marketing"
    summary: >
      JUUL agreed to pay $462 million to six states and D.C., with New York
      receiving $112.7 million, for deceptive youth-oriented marketing including
      colorful ads and youth-appealing flavors.
    why_this_matters: >
      Largest multistate nicotine marketing settlement; models youth-appeal
      restrictions in tobacco/nicotine ads.
    retrieval_keywords: ['JUUL', 'youth vaping', 'nicotine marketing', 'New York AG', 'flavors', 'e-cigarette']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['drugs', 'minors', 'misleading']
    violated_clause_ids:
      - fda.atc.tobacco_format
      - meta.atc.tobacco
    canonical_ids:
      - atc.tobacco_advertising_format_restrictions
      - minors.age_restricted_products_not_shown_to_minors
    outcome: settlement
    monetary_relief: "$462,000,000 (multistate); $112,700,000 (NY share)"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          In November 2019, Attorney General James sued JUUL for its deceptive and
          misleading marketing that glamorized vaping with colorful ads featuring
          young models using fruity, sweet, and minty flavors that appealed to
          youth.
        source_url: https://ag.ny.gov/press-release/2023/attorney-general-james-secures-462-million-juul-its-role-youth-vaping-epidemic
        section: "NY AG Press Release, April 12, 2023"

  - precedent_id: prec.nyag.draftkings_fanduel_2016
    source: "New York State Attorney General"
    source_url: "https://ag.ny.gov/press-release/2016/ag-schneiderman-announces-12-million-settlement-draftkings-and-fanduel"
    date: 2016-10-25
    title: "NY AG v. DraftKings and FanDuel — deceptive daily fantasy advertising"
    summary: >
      DraftKings and FanDuel each paid $6 million to settle NY AG allegations of
      false advertising about odds of winning, deposit matches, and failure to
      disclose that top 1% of players won most prizes.
    why_this_matters: >
      Landmark gambling-adjacent deception case on odds disclosure and responsible
      gambling messaging.
    retrieval_keywords: ['DraftKings', 'FanDuel', 'daily fantasy', 'gambling advertising', 'odds disclosure', 'New York AG']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['gambling', 'misleading', 'financial']
    violated_clause_ids:
      - google.gambling.responsible
      - ftc.misleading.reasonable_basis
    canonical_ids:
      - gambling.responsible_gambling_required
      - misleading.missing_or_inconsistent_material_info
    outcome: settlement
    monetary_relief: "$12,000,000 ($6M each)"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Each Company Agrees To Pay $6 Million For Repeated False Advertising
          Violations In New York; Year-Long Investigation Found That Both Companies
          Had Consistently Misled Consumers In Advertisements.
        source_url: https://ag.ny.gov/press-release/2016/ag-schneiderman-announces-12-million-settlement-draftkings-and-fanduel
        section: "NY AG Press Release, Oct 25, 2016"

  - precedent_id: prec.nyag.sports_betting_superbowl_2022
    source: "New York State Attorney General"
    source_url: "https://ag.ny.gov/press-release/2022/consumer-alert-attorney-general-james-warns-new-yorkers-deceptive-online-sports"
    date: 2022-02-10
    title: "NY AG consumer alert — deceptive online sports betting Super Bowl ads"
    summary: >
      Attorney General James warned New Yorkers about misleading sports-betting
      ads touting risk-free bets and $1,000 welcome offers that often carry hidden
      wagering requirements and restrictions.
    why_this_matters: >
      Official AG guidance flagging risk-free and bonus-deposit ad patterns as
      deceptive in newly legal NY online sports betting.
    retrieval_keywords: ['New York AG', 'sports betting', 'Super Bowl', 'risk-free bets', 'welcome bonus', 'deceptive ads']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['gambling', 'misleading', 'financial']
    violated_clause_ids:
      - ftc.misleading.express_implied
      - google.gambling.responsible
    canonical_ids:
      - misleading.missing_or_inconsistent_material_info
      - gambling.responsible_gambling_required
    outcome: guidance
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Since online sports gambling became legal in New York last month, New
          Yorkers have been bombarded with misleading ads on social media and
          streaming sites that claim "risk-free" bets and "$1,000 welcome offers,"
          which sound like free money, but often come with strings attached without
          consumers' awareness.
        source_url: https://ag.ny.gov/press-release/2022/consumer-alert-attorney-general-james-warns-new-yorkers-deceptive-online-sports
        section: "NY AG Consumer Alert, Feb 10, 2022"

  - precedent_id: prec.nyag.4kapps_healthcare_2024
    source: "New York State Attorney General"
    source_url: "https://ag.ny.gov/press-release/2024/attorney-general-james-secures-15-million-digital-marketing-company-misleading"
    date: 2024-08-15
    title: "NY AG v. 4K Apps — deceptive healthcare lead-generation directories"
    summary: >
      4K Apps paid $1.5 million after the NY AG found it ran deceptive mental-
      health and substance-abuse directories that routed callers to paid clients
      instead of listed facilities.
    why_this_matters: >
      Healthcare lead-gen ad precedent on directory misdirection and treatment-
      facility bait-and-switch.
    retrieval_keywords: ['4K Apps', 'New York AG', 'mental health', 'lead generation', 'healthcare marketing', 'deceptive directories']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['health', 'misleading']
    violated_clause_ids:
      - ftc.health.material_safety_disclosure
      - google.health.unauthorized_pharmacies
    canonical_ids:
      - health.health_privacy_sensitive_attributes
      - misleading.false_affiliation_or_endorsement
    outcome: settlement
    monetary_relief: "$1,500,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The Office of the Attorney General (OAG) found that 4K Apps created dozens
          of websites that claimed to help consumers find and connect with health
          care and other services, but once consumers went onto those websites, they
          were shown phone numbers for 4K Apps' clients, not the facilities listed.
        source_url: https://ag.ny.gov/press-release/2024/attorney-general-james-secures-15-million-digital-marketing-company-misleading
        section: "NY AG Press Release, August 2024"

  - precedent_id: prec.nyag.cameo_endorsements_2024
    source: "New York State Attorney General"
    source_url: "https://ag.ny.gov/press-release/2024/attorney-general-james-secures-100000-cameo-over-misleading-videos"
    date: 2024-06-12
    title: "NY AG v. Cameo — undisclosed Business Cameo paid endorsements"
    summary: >
      Cameo paid $100,000 in a 30-state settlement after regulators found Business
      Cameo celebrity videos lacked required paid-endorsement disclosures.
    why_this_matters: >
      Celebrity/influencer platform precedent for paid endorsement labeling in
      short-form video ads.
    retrieval_keywords: ['Cameo', 'Business Cameo', 'paid endorsement', 'influencer disclosure', 'FTC Endorsement Guides', 'celebrity ads']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['misleading', 'financial']
    violated_clause_ids:
      - ftc.misleading.reasonable_basis
      - sec.finance.testimonials
    canonical_ids:
      - finance.testimonials_endorsements_disclosure
      - misleading.false_affiliation_or_endorsement
    outcome: settlement
    monetary_relief: "$100,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The Office of the Attorney General (OAG) found that Cameo failed to
          implement measures to ensure those videos were properly disclosed as paid
          endorsements, which violated endorsement rules issued by the Federal Trade
          Commission (FTC) and New York's consumer protection laws.
        source_url: https://ag.ny.gov/press-release/2024/attorney-general-james-secures-100000-cameo-over-misleading-videos
        section: "NY AG Press Release, June 2024"

  - precedent_id: prec.nyag.google_iheart_pixel_2022
    source: "New York State Attorney General / FTC"
    source_url: "https://ag.ny.gov/press-release/2022/attorney-general-james-secures-94-million-google-and-iheartmedia-over-misleading"
    date: 2022-11-28
    title: "NY AG/FTC v. Google and iHeartMedia — fake Pixel 4 radio endorsements"
    summary: >
      Google and iHeartMedia paid $9.4 million after regulators found radio
      personalities recorded Pixel 4 endorsement ads describing personal use of a
      phone they had never used.
    why_this_matters: >
      Landmark false personal-experience endorsement case for audio and
      influencer-style ads.
    retrieval_keywords: ['Google Pixel 4', 'iHeartMedia', 'radio ads', 'false endorsement', 'influencer', '$9.4 million']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['misleading']
    violated_clause_ids:
      - ftc.misleading.reasonable_basis
      - google.misrep.misleading_representation
    canonical_ids:
      - misleading.false_affiliation_or_endorsement
      - finance.testimonials_endorsements_disclosure
    outcome: settlement
    monetary_relief: "$9,400,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Google paid radio personalities to record endorsement ads describing their
          positive experience using the Google Pixel 4 phone, however, they had
          never used the phone prior to recording or running the ads.
        source_url: https://ag.ny.gov/press-release/2022/attorney-general-james-secures-94-million-google-and-iheartmedia-over-misleading
        section: "NY AG Press Release, November 2022"

  - precedent_id: prec.caag.roomster_fake_reviews_2023
    source: "California Attorney General / FTC"
    source_url: "https://oag.ca.gov/news/press-releases/attorney-general-bonta-announces-settlement-room-rental-app-purchasing-fake"
    date: 2023-08-30
    title: "CA AG/FTC v. Roomster — purchased fake app reviews and false verification"
    summary: >
      Roomster settled after a multi-state suit alleging it bought at least 20,000
      fake positive app-store reviews and falsely claimed listings were verified
      and authentic.
    why_this_matters: >
      Joint state/FTC fake-review enforcement tied to the 2024 FTC reviews rule —
      app-store ad manipulation.
    retrieval_keywords: ['Roomster', 'fake reviews', 'app store', 'California AG', 'verified listings', 'astroturfing']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['misleading']
    violated_clause_ids:
      - ftc.misleading.reasonable_basis
      - google.misrep.unreliable_claims
    canonical_ids:
      - misleading.unsubstantiated_objective_claims
      - misleading.false_affiliation_or_endorsement
    outcome: settlement
    monetary_relief: "$1,600,000 (multi-state)"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          An investigation into Roomster found that the company purchased at least
          20,000 fake positive reviews for its app in the Google and Apple app
          stores.
        source_url: https://oag.ca.gov/news/press-releases/attorney-general-bonta-files-lawsuit-against-room-rental-app-purchasing-fake
        section: "CA AG Press Release, August 2022 lawsuit"

