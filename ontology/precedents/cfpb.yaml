      BloomTech (Lambda School) was ordered to stop deceptive ISA practices and
      pay penalties after the CFPB found it misled students about job-placement
      rates and failed to disclose ISA finance charges under TILA.
    why_this_matters: >
      Ed-tech and coding-bootcamp ad precedent on job-outcome claims and ISA
      credit advertising.
    retrieval_keywords: ['BloomTech', 'Lambda School', 'income share agreement', 'ISA', 'coding bootcamp', 'job placement']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial', 'misleading']
    violated_clause_ids:
      - cfpb.finance.actually_available_terms
      - cfpb.finance.trigger_terms
    canonical_ids:
      - finance.misleading_or_unbalanced_claims
      - finance.credit_advertising_trigger_terms
    outcome: consent_order
    monetary_relief: "$164,000 (penalty)"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
