# FTC enforcement precedents — Phase 1 expansion (official sources only).

precedents:
  - precedent_id: prec.ftc.facebook_privacy_2019
    source: "U.S. Federal Trade Commission"
    source_url: "https://www.ftc.gov/news-events/news/press-releases/2019/07/ftc-imposes-5-billion-penalty-sweeping-new-privacy-restrictions-facebook"
    date: 2019-07-24
    title: "FTC v. Facebook — record $5B privacy penalty and conduct relief"
    summary: >
      Facebook agreed to pay a record $5 billion civil penalty and accept sweeping
      privacy restrictions after the FTC found it deceived users about control
      over personal information in violation of a 2012 order.
    why_this_matters: >
      Landmark privacy enforcement setting the penalty baseline for targeted-ad
      and data-sharing violations at platform scale.
    retrieval_keywords: ['Facebook', 'Meta', 'privacy', '5 billion', 'COPPA-adjacent data', 'targeted advertising', 'consent order']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['privacy', 'misleading']
    violated_clause_ids:
      - ccpa.privacy.opt_out_sale_sharing
    canonical_ids:
      - privacy.opt_out_of_sale_or_sharing_for_targeted_ads
    outcome: civil_penalty
    monetary_relief: "$5,000,000,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Despite repeated promises to its billions of users worldwide that they
          could control how their personal information is shared, Facebook
          undermined consumers' choices.
        source_url: https://www.ftc.gov/news-events/news/press-releases/2019/07/ftc-imposes-5-billion-penalty-sweeping-new-privacy-restrictions-facebook
        section: "FTC Press Release, July 24, 2019"

  - precedent_id: prec.ftc.goodrx_health_data_2023
    source: "U.S. Federal Trade Commission / U.S. Department of Justice"
    source_url: "https://www.ftc.gov/news-events/news/press-releases/2023/02/ftc-enforcement-action-bar-goodrx-sharing-consumers-sensitive-health-info-advertising"
    date: 2023-02-01
    title: "FTC/DOJ v. GoodRx — health data shared with ad platforms"
    summary: >
      GoodRx agreed to pay $1.5 million and is permanently barred from sharing
      user health data with third parties for advertising after the FTC alleged it
      deceptively promised privacy while sharing prescription and condition data
      with Facebook, Google, and others.
    why_this_matters: >
      First FTC Health Breach Notification Rule case; models health-adjacent
      retargeting and sensitive-attribute misuse in ads.
    retrieval_keywords: ['GoodRx', 'health data', 'Facebook ads', 'Google ads', 'prescription', 'retargeting', 'HIPAA-adjacent']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['health', 'privacy', 'misleading']
    violated_clause_ids:
      - ftc.misleading.reasonable_basis
      - ftc.health.material_safety_disclosure
    canonical_ids:
      - health.health_privacy_sensitive_attributes
      - privacy.sensitive_attribute_targeting_prohibited
    outcome: civil_penalty
    monetary_relief: "$1,500,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          GoodRx repeatedly violated this promise by sharing sensitive personal
          health information—including its users' prescription medications and
          personal health conditions—with third party advertising companies and
          advertising platforms like Facebook, Google, and Criteo.
        source_url: https://www.ftc.gov/news-events/news/press-releases/2023/02/ftc-enforcement-action-bar-goodrx-sharing-consumers-sensitive-health-info-advertising
        section: "FTC Press Release, Feb 1, 2023"

