# Build container for Cloud Run (run from repo root).
#
#   export PROJECT_ID=your-project-id
#   export REGION=us-central1
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_IMAGE_TAG=phase4-$(date +%Y%m%d-%H%M%S) .
#
substitutions:
  _REGION: us-central1
  _HF_TOKEN: ""
  _IMAGE_TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - HF_TOKEN=${_HF_TOKEN}
      - -f
      - docker/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/zataone/zataone-api:${_IMAGE_TAG}
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/zataone/zataone-api:${_IMAGE_TAG}

timeout: 2400s
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_32
