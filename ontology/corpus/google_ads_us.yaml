        lead generators, and those who connect consumers with third-party
        lenders.
      source_url: https://support.google.com/adspolicy/answer/2464998
      section: "Financial products and services > High APR personal loans (US specific)"
      retrieved_at: 2026-06-27

  - id: google.finance.binary_options
    source_id: google_ads_us
    category_id: financial
    text: >
      Ads for binary options or equivalent financial products are not allowed,
      including binary options brokers, and informational or educational sites
      and blogs on binary options and equivalent products.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-binary-options"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        Ads for binary options or equivalent financial products are not allowed.
        Binary Options brokers: Sites that offer binary options and signals or
        software for binary options with no other financial products are not
        allowed. Binary Options informational or educational sites and blogs:
        Educational sites or blogs on binary options and equivalent products are
        not allowed.
      source_url: https://support.google.com/adspolicy/answer/2464998
      section: "Financial products and services > Binary options"
      retrieved_at: 2026-06-27

  - id: google.finance.complex_speculative
    source_id: google_ads_us
    category_id: financial
    text: >
      Google only allows advertisements for complex speculative financial
      products (such as Contracts for Difference, financial spread betting, and
      rolling spot forex) in select locations and only if the advertiser is a
      licensed provider or aggregator, the products and ads comply with local
      laws, the location is eligible, and the account has received approval.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-complex-speculative"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        Due to the inherent complexities and risks involved in trading the
        following types of complex speculative financial products, to protect
        users, Google only allow advertisements for these products in select
        locations and only if they meet all of the following criteria: The
        advertiser is a licensed provider or aggregator; The products and ads
        comply with local laws and industry standards; The targeted location is
        eligible for advertising under this policy and; The account has received
        approval from Google Ads to run ads about these products.
      source_url: https://support.google.com/adspolicy/answer/2464998
      section: "Financial products and services > Complex speculative financial products"
      retrieved_at: 2026-06-27

