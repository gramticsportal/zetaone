# FTC enforcement precedents — Phase 3 (final US expansion).

precedents:
  - precedent_id: prec.ftc.hrblock_free_filing_2024
    source: "U.S. Federal Trade Commission"
    source_url: "https://www.ftc.gov/news-events/news/press-releases/2024/11/ftc-action-stops-hr-blocks-unfair-downgrading-practices-deceptive-promises-free-filing"
    date: 2024-11-21
    title: "FTC v. H&R Block — deceptive 'free' filing and unfair downgrading"
    summary: >
      H&R Block agreed to pay $7 million and stop unfair downgrading practices and
      deceptive 'free' tax filing claims after the FTC sued over dark-pattern
      downgrade flows and data deletion.
    why_this_matters: >
      Follow-on to Intuit/TurboTax 'free filing' deception — tax-prep ads with
      hidden eligibility and downgrade friction.
    retrieval_keywords: ['H&R Block', 'free filing', 'tax prep', 'downgrade', 'dark patterns', 'TurboTax', '$7 million']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['financial', 'misleading']
    violated_clause_ids:
      - ftc.misleading.reasonable_basis
      - cfpb.finance.actually_available_terms
    canonical_ids:
      - finance.misleading_or_unbalanced_claims
      - misleading.unsubstantiated_objective_claims
    outcome: settlement
    monetary_relief: "$7,000,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          A proposed FTC settlement would stop H&R Block from unfairly requiring
          consumers seeking to downgrade to a cheaper H&R Block product to contact
          customer service, from unfairly deleting users' previously entered data
          and from making deceptive claims about "free" tax filing.
        source_url: https://www.ftc.gov/news-events/news/press-releases/2024/11/ftc-action-stops-hr-blocks-unfair-downgrading-practices-deceptive-promises-free-filing
        section: "FTC Press Release, November 2024"

  - precedent_id: prec.ftc.instacart_deceptive_2025
