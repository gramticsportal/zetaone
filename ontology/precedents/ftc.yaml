- precedent_id: prec.ftc.omics_deceptive_publishing_2019
  source: U.S. Federal Trade Commission
  source_url: https://www.ftc.gov/news-events/news/press-releases/2019/04/ftc-charges-academic-journal-publisher-omics-group-deceived-researchers
  date: 2019-04-02
  title: FTC v. OMICS Group — deceptive academic publishing marketing
  summary: 'The FTC charged OMICS Group with deceiving researchers about the nature of its conferences and publications, hiding publication fees until after accepting articles, and falsely claiming peer review. A federal court ordered OMICS to pay more than $50.1 million.

    '
  category_ids:
  - misleading
  violated_clause_ids:
  - ftc.misleading.express_implied
  canonical_ids:
  - misleading.missing_or_inconsistent_material_info
  outcome: court_order
  monetary_relief: $50,100,000+ (court judgment)
  status: final
  jurisdiction: US
  retrieved_at: 2026-06-27
  evidence:
  - quote: OMICS made false claims about the nature of its conferences and publications, hid steep publication fees until after it accepted articles, and falsely claimed that its journals provided rigorous peer review.
    source_url: https://www.ftc.gov/news-events/news/press-releases/2019/04/ftc-charges-academic-journal-publisher-omics-group-deceived-researchers
    section: FTC Press Release, April 2, 2019
  why_this_matters: Deceptive academic/publishing claims case relevant to B2B and health-adjacent marketing.
