  - id: google.finance.loan_modification
    source_id: google_ads_us
    category_id: financial
    text: >
      Google restricts loan-modification products and services. The following
      lead to disapproval: guaranteeing loan modification or foreclosure
      prevention; charging an upfront fee (unless the service is provided by a
      law firm); asking users to transfer or surrender property titles or
      offering to buy a house below market price; asking users to bypass the
      lender and pay the company directly; and encouraging users not to contact
      their lender, lawyer, credit counselor, or housing counselor.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-loan-modification"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        ... the following scenarios would lead to disapproval for Loan
        modification: Guaranteeing loan modification or foreclosure prevention;
        Charging an upfront fee, unless service is being provided by a law firm;
        Asking users to transfer or surrender property titles, or offering to
        buy a house at a below-market price; Asking users to bypass the lender
        and make payments directly to the company or other third party;
        Encouraging users not to contact their lender, lawyer, credit counselor,
        or housing counselor.
      source_url: https://support.google.com/adspolicy/answer/2464998
      section: "Financial products and services > Loan modification"
      retrieved_at: 2026-06-27

  - id: google.finance.crypto
    source_id: google_ads_us
    category_id: financial
    text: >
      Google Ads allows certain categories of cryptocurrency-related products
      and services to be advertised with and without certification by Google in
      limited circumstances. Advertisers must comply with state and local
      regulations for any region or country that their ads target.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-cryptocurrencies"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        Due to the complex and evolving nature of regulations related to
        cryptocurrencies and related products and services, Google Ads allows
        certain categories of cryptocurrency-related products and services to be
        advertised with and without certification by Google in limited
        circumstances. When promoting cryptocurrencies and related products, you
        must comply with state and local regulations for any region or country
        that your ads target.
      source_url: https://support.google.com/adspolicy/answer/2464998
      section: "Financial products and services > Cryptocurrencies and related products"
      retrieved_at: 2026-06-27

  - id: google.finance.verification
    source_id: google_ads_us
    category_id: financial
    text: >
      Advertisers are required to complete a verification process to advertise
