# Ad Corpus version manifest.
# Each completed category is FROZEN and assigned a version so the corpus is
# reproducible and benchmarkable alongside the evaluation dataset. Bump the
# version and add a release entry whenever a category is completed/changed.

current_version: "Ad Corpus v0.7"

releases:
  - version: "Ad Corpus v0.1"
    date: 2026-06-24
    status: frozen
    categories: [misleading]
    sources: [meta_ads_us, google_ads_us, tiktok_ads_us, ftc_us]
    canonical_rules:
      - misleading.exaggerated_results
      - misleading.guaranteed_outcomes
      - misleading.false_affiliation_or_endorsement
      - misleading.before_after_distortion
      - misleading.fake_scarcity_or_urgency
      - misleading.missing_or_inconsistent_material_info
      - misleading.unsubstantiated_objective_claims
    eval_examples: 30
    note: First frozen vertical (Misleading / Deceptive).

  - version: "Ad Corpus v0.2"
    date: 2026-06-24
    status: frozen
    categories: [misleading, health]
    sources: [meta_ads_us, google_ads_us, tiktok_ads_us, ftc_us, fda_us]
    canonical_rules_added:
      - health.disease_cure_treatment_claims
      - health.unsubstantiated_health_claims
      - health.prescription_drug_promotion_restricted
      - health.unapproved_or_dangerous_products
      - health.negative_self_perception_body_image
      - health.rx_fair_balance_risk_disclosure
      - health.health_privacy_sensitive_attributes
      - health.material_risk_safety_disclosure
    eval_examples: 90        # 30 misleading + 60 health
    schema_version: "1.0.0"  # schema frozen; evidence + last_reviewed_by added to every clause
    note: >
      Adds Health / Medical vertical from official Meta, Google, TikTok, FTC, and
      FDA sources. All clauses traceable to official policy; nothing invented.
      Every clause now carries an `evidence` block (verbatim quote, deep link,
      section, retrieved_at) and `last_reviewed_by` (ai until human-verified).
      TikTok health clauses corrected to the policy's actual United States market
      section (Rx/OTC/pharmacy/fillers may be allowed with FDA/NABP/LegitScript
      certification + 18+); the earlier blanket US weight-loss/invasive-cosmetic
      bans were not traceable to the official US section and were removed.

  - version: "Ad Corpus v0.3"
    date: 2026-06-27
    status: frozen
    categories: [misleading, health, financial]
    sources: [meta_ads_us, google_ads_us, tiktok_ads_us, linkedin_ads_us, ftc_us, fda_us, sec_us, finra_us, cfpb_us]
    canonical_rules_added:
      - finance.prohibited_predatory_products
      - finance.guaranteed_returns_or_risk_free
      - finance.misleading_or_unbalanced_claims
      - finance.performance_claims_substantiation
      - finance.required_cost_and_risk_disclosures
      - finance.credit_advertising_trigger_terms
      - finance.licensing_registration_required
      - finance.crypto_restricted
      - finance.loan_modification_foreclosure_restricted
      - finance.mortgage_advertising_prohibited_acts   # CFPB-only (single-source)
      - finance.testimonials_endorsements_disclosure   # SEC-only (single-source)
    eval_examples: 150       # 30 misleading + 60 health + 60 financial
    schema_version: "1.0.0"  # unchanged; schema frozen
    note: >
      Adds Financial services & investments vertical (US only) from official
      Meta, Google, TikTok, and LinkedIn ad policies and US regulators FTC, SEC
      (Marketing Rule 17 CFR 275.206(4)-1), FINRA (Rule 2210), and CFPB (Reg Z /
      TILA, 12 CFR 1026.24). Adds new sources linkedin_ads_us, sec_us, finra_us,
      cfpb_us. Every clause carries an `evidence` block (verbatim quote, deep
      link, section, retrieved_at) and `last_reviewed_by: ai`.       Two canonicals are
      intentionally single-source (CFPB mortgage prohibited acts; SEC testimonial
      disclosures) and carry no `mapping` entry until a second official source
      genuinely matches — keeping the corpus honest.

  - version: "Ad Corpus v0.4"
    date: 2026-06-27
    status: frozen
    categories: [misleading, health, financial, discrimination]
    sources: [meta_ads_us, google_ads_us, tiktok_ads_us, linkedin_ads_us, ftc_us, fda_us, sec_us, finra_us, cfpb_us, hud_us, eeoc_us]
    canonical_rules_added:
      - discrimination.discriminatory_ad_content_prohibited
      - discrimination.restricted_targeting_protected_class
    eval_examples: 210       # 30 misleading + 60 health + 60 financial + 60 housing/employment
    schema_version: "1.0.0"  # unchanged; schema frozen
    note: >
      Adds Housing & Employment vertical (US only, category `discrimination`) from
      official Meta (Discriminatory Practices + Special Ad Category), Google
      (Personalized advertising restricted targeting for Housing/Employment/
      Consumer Finance), TikTok (HEC Ad Policy), and LinkedIn (Discrimination +
      Ads-and-discrimination) policies, plus US regulators HUD/Fair Housing Act
      (42 U.S.C. § 3604(c)), EEOC/Title VII + ADEA (29 U.S.C. § 623(e)), and FTC
      ECOA / Regulation B (12 CFR 1002.4(b), credit discouragement). New sources
      hud_us, eeoc_us. Two cross-source canonicals: discriminatory ad content
      (Meta, TikTok, LinkedIn, HUD, EEOC, FTC) and restricted protected-class
      targeting (Meta, Google, TikTok, LinkedIn). Every clause carries an
      `evidence` block + `last_reviewed_by: ai`; nothing invented.

  - version: "Ad Corpus v0.5"
    date: 2026-06-27
    status: frozen
    categories: [misleading, health, financial, discrimination, political]
    sources: [meta_ads_us, google_ads_us, tiktok_ads_us, linkedin_ads_us, ftc_us, fda_us, sec_us, finra_us, cfpb_us, hud_us, eeoc_us, fec_us]
    canonical_rules_added:
      - political.authorization_and_disclaimer_required
      - political.paid_political_ads_prohibited
      - political.synthetic_content_disclosure          # Google-only (single-source)
    eval_examples: 270       # 30 misleading + 60 health + 60 financial + 60 housing/employment + 60 political
    schema_version: "1.0.0"  # unchanged; schema frozen
    note: >
      Adds Political & Social Issues vertical (US only, category `political`).
      Two distinct regimes are captured honestly rather than forced into one
      canonical: Meta (authorization + verified "Paid for by" disclaimer) and
      Google (election-ads verification + "Paid for by" disclosure + election-law
      / silence-period compliance) ALLOW political ads with disclosure, mapped
      with FEC (11 CFR 110.11 / 52 U.S.C. 30120 disclaimer regime) under
      political.authorization_and_disclaimer_required; whereas TikTok (Politics,
      Governments, and Elections) and LinkedIn (Political) BAN paid political
      advertising outright, mapped under political.paid_political_ads_prohibited.
      Google's synthetic/digitally-altered-content disclosure is a single-source
      canonical with no `mapping` entry until a second official source matches.
      New source fec_us. Every clause carries an `evidence` block (verbatim
      quote, deep link, section, retrieved_at) + `last_reviewed_by: ai`.

  - version: "Ad Corpus v0.6"
    date: 2026-06-27
    status: frozen
    categories: [misleading, health, financial, discrimination, political, minors]
    sources: [meta_ads_us, google_ads_us, tiktok_ads_us, linkedin_ads_us, ftc_us, fda_us, sec_us, finra_us, cfpb_us, hud_us, eeoc_us, fec_us]
    canonical_rules_added:
      - minors.personalized_targeting_of_minors_restricted
      - minors.age_restricted_products_not_shown_to_minors
      - minors.parental_consent_for_childrens_data          # FTC COPPA (single-source)
      - minors.child_directed_content_ad_restrictions        # Google made-for-kids (single-source)
    eval_examples: 330       # + 60 children/minors
    schema_version: "1.0.0"  # unchanged; schema frozen
    new_artifacts:
      - ontology/policy_versions.yaml   # sidecar: per-source policy version/effective/updated/status/change-history
    note: >
      Adds Children / Minors vertical (US only, new category `minors`) from
      official Meta (About Advertising to Teens — age+location only; restricted
      topics not to under-18), Google (Ad-serving protections for children and
      teens — under-18 ineligible for personalized advertising; sensitive
      categories restricted; made-for-kids: no personalized ads/third-party
      trackers/purchase incitement/misleading claims), TikTok (About advertising
      to under-18 + Protecting minors initiatives), and FTC COPPA (16 CFR Part
      312 — verifiable parental consent before collecting children's personal
      information; persistent identifiers; no behavioral advertising under the
      internal-operations exception). Two cross-source canonicals (personalized
      targeting of minors restricted; age-restricted products not to minors) plus
      two single-source canonicals (COPPA parental consent; Google made-for-kids)
      kept honestly unmapped. Introduces ontology/policy_versions.yaml sidecar to
      track policy version / effective / last-updated / deprecated-superseded
      status / officially published change history — without changing the frozen
      schema.

  - version: "Ad Corpus v0.7"
    date: 2026-06-27
    status: frozen
    categories: [misleading, health, financial, discrimination, political, minors, privacy]
    sources: [meta_ads_us, google_ads_us, tiktok_ads_us, linkedin_ads_us, ftc_us, fda_us, sec_us, finra_us, cfpb_us, hud_us, eeoc_us, fec_us, ccpa_ca]
    canonical_rules_added:
      - privacy.sensitive_attribute_targeting_prohibited
      - privacy.data_collection_disclosure_required          # TikTok (single-source)
      - privacy.opt_out_of_sale_or_sharing_for_targeted_ads  # CCPA/CPRA (single-source)
      - privacy.minor_opt_in_for_sale_or_sharing             # CCPA/CPRA (single-source)
    eval_examples: 390       # + 60 privacy
    schema_version: "1.0.0"  # unchanged; schema frozen
    note: >
      Adds Privacy & Personal Data vertical (category `privacy`) from official
      Meta (Privacy Violations and Personal Attributes), Google (Restricted
      targeting in Personalized advertising — sensitive interest categories),
      LinkedIn (sensitive-data targeting prohibition), TikTok (Data Collection
      Standards), and CCPA/CPRA (Cal. Civ. Code §§ 1798.120 & 1798.135 — opt out
      of sale/sharing for cross-context behavioral advertising; under-16 opt-in).
      New source ccpa_ca. One cross-source canonical (sensitive-attribute
      targeting: Meta, Google, LinkedIn) plus three single-source canonicals
      (TikTok data-collection disclosure; CCPA opt-out; CCPA minor opt-in) kept
      honestly unmapped. Every clause carries an `evidence` block +
      `last_reviewed_by: ai`.
