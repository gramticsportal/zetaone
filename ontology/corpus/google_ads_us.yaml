        allowed, the following restrictions apply: Prescription drugs may not be
        promoted. Promotions may not create misleading expectations or effects of
        a product being tested. Promotions may not imply that the products being
        tested are safe.
      source_url: https://support.google.com/adspolicy/answer/176031
      section: "Healthcare and medicines > Clinical trial recruitment"
      retrieved_at: 2026-06-24

  # ===================== Financial =====================
  - id: google.finance.disclosures
    source_id: google_ads_us
    category_id: financial
    text: >
      When promoting financial products or services, advertisers must provide
      the physical address for the business, all associated fees, and links to
      third-party accreditation or endorsement where affiliation is asserted or
      implied. Disclosures must be clearly and immediately visible without
      needing to click or hover over anything.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-financial-products-services"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        If you're promoting financial products or services, you're required to
        provide: The physical address for the business offering the financial
        product or service; All associated fees; Links to third-party
        accreditation or endorsement where affiliation is asserted or implied
        ... Disclosures can't be posted as roll-over text or made available
        through another link or tab. They must be clearly and immediately
        visible without needing to click or hover over anything.
      source_url: https://support.google.com/adspolicy/answer/2464998
      section: "Financial products and services > Financial products and services disclosures"
      retrieved_at: 2026-06-27

  - id: google.finance.personal_loans
    source_id: google_ads_us
    category_id: financial
    text: >
      Only personal loans that require repayment in full in 61 days or longer
      are allowed. Advertisers promoting personal loans must prominently
      disclose the minimum and maximum period for repayment, the maximum Annual
      Percentage Rate (APR), and a representative example of the total cost of
      the loan, including all applicable fees.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-financial-products-services"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [18+]
      industries: [financial]
    evidence:
      quote: >-
        Only personal loans that require repayment in full in 61 days or longer
        are allowed. ... If you promote personal loans, you're required to
        prominently disclose all of the following additional information on your
        ad's destination: Minimum and maximum period for repayment; Maximum
        Annual Percentage Rate (APR) ...; A representative example of the total
        cost of the loan, including all applicable fees.
      source_url: https://support.google.com/adspolicy/answer/2464998
      section: "Financial products and services > Personal loans"
      retrieved_at: 2026-06-27

