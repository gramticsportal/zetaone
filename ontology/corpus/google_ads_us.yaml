        Users under the age of 18 are not eligible for personalized advertising
        of any kind, including serving based on Predefined Google Audiences.
        Advertisers using advertiser-curated audiences are prohibited from
        uploading customer information from viewers of child-directed content.
      source_url: https://support.google.com/adspolicy/answer/143465
      section: "Restricted targeting in Personalized advertising > Users under 18"
      retrieved_at: 2026-06-27

  - id: google.minors.sensitive_categories_restricted
    source_id: google_ads_us
    category_id: minors
    text: >
      Ad-serving protections for children and teens disable ads personalization
      and restrict sensitive ad content and categories for users under 18, such
      as gambling, alcohol, adult content and pornography, shocking content,
      dating and relationships, and body modification and weight loss.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2021-08-15
    version: "ad-serving-protections-children-teens"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [minors]
      industries: [minors]
    evidence:
      quote: >-
        These protections include disabling ads personalization and restricting
        sensitive ad content and categories for users above the digital age of
        consent and under 18 years old, such as: ... Shocking content ...
        Gambling ... Alcohol ... Adult content and pornography ... Dating and
        relationships ... Body modification and weight loss.
      source_url: https://support.google.com/adspolicy/answer/15416897
      section: "Ad protections for children and teens"
      retrieved_at: 2026-06-27

  - id: google.minors.made_for_kids
    source_id: google_ads_us
    category_id: minors
    text: >
      On content set as "made for kids" on YouTube, advertisers may not run
      personalized ads or use any third-party trackers. The policy also prohibits
      inciting children to purchase a product and prohibits misleading and
      deceptive claims.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2020-01-06
    version: "ads-and-made-for-kids-content"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [under_13]
      industries: [minors]
    evidence:
      quote: >-
        Under this policy, advertisers may not run personalized ads or make use
        of any third party trackers on content set as "made for kids". The policy
        also prohibits inciting children to purchase a product and misleading and
        deceptive claims.
      source_url: https://support.google.com/adspolicy/answer/15416897
      section: "Ad protections for children and teens > Ads & made for kids content"
      retrieved_at: 2026-06-27

  # ===================== Privacy & Personal Data =====================
  - id: google.privacy.sensitive_interest_categories
    source_id: google_ads_us
    category_id: privacy
    text: >
      Advertisers promoting products and services that fall within sensitive
      interest categories are unable to use advertiser-curated audiences
      (Customer Match, data segments/remarketing, audience expansion, lookalike,
      and custom segments). Sensitive interest categories include health, sexual
      orientation, race and ethnicity, religious beliefs, negative financial
      status, political affiliation, and relationship hardships, among others.
      Predefined Google audiences may be used because sensitive user signals are
      excluded from them.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "personalized-advertising-sensitive-categories"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [privacy]
    evidence:
      quote: >-
        Advertisers promoting products and services that fall within sensitive
        interest categories are unable to use advertiser-curated audiences. This
        helps ensure that sensitive interest categories aren't inadvertently used
        for targeting audiences. Because predefined Google audiences are
        expressly configured without sensitive user signals, all advertisers are
        allowed to use them, even if they promote sensitive interest categories.
      source_url: https://support.google.com/adspolicy/answer/143465
      section: "Restricted targeting in Personalized advertising > Sensitive interest categories"
      retrieved_at: 2026-06-27

  # ===================== Alcohol / Tobacco / Cannabis =====================
  - id: google.atc.alcohol
    source_id: google_ads_us
    category_id: alcohol
    text: >
      Google Ads follows local alcohol laws and industry standards. Alcohol ads
      must not target minors and may only target locations allowed to show
      alcohol ads. Content that promotes harmful or illegal consumption is
      prohibited: any ad implying health or social benefits from alcohol,
      promoting alcohol use in dangerous situations (e.g. driving), or encouraging
      underage or excessive drinking will be disapproved.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "adspolicy-alcohol"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: ["21+"]
      industries: [alcohol]
    evidence:
      quote: >-
        Google Ads prohibits content that promotes harmful or illegal consumption
        or alcohol. Any ad implying health or social benefits from alcohol,
        promoting alcohol use in dangerous situations like driving, or encouraging
        underage or excessive drinking will be disapproved. ... The following is
        not allowed: Targeting individuals below the legal drinking age in one or
        more locations your ads target.
      source_url: https://support.google.com/adspolicy/answer/6012382
      section: "Advertising Policies > Alcohol"
      retrieved_at: 2026-06-27

  - id: google.atc.tobacco
    source_id: google_ads_us
    category_id: drugs
    text: >
      Ads for tobacco or any products containing tobacco are not allowed. Ads for
      products that form a component part of a tobacco product, or that directly
      facilitate or promote tobacco consumption, are not allowed, as are ads for
      products designed to simulate tobacco smoking (e.g. herbal cigarettes,
      electronic cigarettes, e-cigarettes).
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "adspolicy-tobacco"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [drugs]
    evidence:
      quote: >-
        Ads for tobacco or any products containing tobacco are not allowed. ...
        Ads for products that form a component part of a tobacco product, as well
        as products and services that directly facilitate or promote tobacco
        consumption are not allowed. ... Ads for products designed to simulate
        tobacco smoking are not allowed. Examples (non-exhaustive): Herbal
        cigarettes, electronic cigarettes, e-cigarettes.
      source_url: https://support.google.com/adspolicy/answer/16489929
      section: "Dangerous products or services > Tobacco"
      retrieved_at: 2026-06-27

  - id: google.atc.recreational_drugs
    source_id: google_ads_us
    category_id: drugs
    text: >
      Ads for substances that alter mental state for the purpose of recreation or
      otherwise induce "highs" are not allowed, as are ads for products or
      services marketed as facilitating recreational drug use and instructional
      content about producing, purchasing, or using recreational drugs.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "adspolicy-dangerous-recreational-drugs"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [drugs]
    evidence:
      quote: >-
        Ads for substances that alter mental state for the purpose of recreation
        or otherwise induce "highs" are not allowed. Ads for products or services
        marketed as facilitating recreational drug use are not allowed. Ads for
        instructional content about producing, purchasing, or using recreational
        drugs are not allowed.
      source_url: https://support.google.com/adspolicy/answer/6014299
      section: "Dangerous products or services > Recreational drugs"
      retrieved_at: 2026-06-27

  - id: google.atc.cbd
    source_id: google_ads_us
    category_id: drugs
    text: >
      Ads for topical, hemp-derived cannabidiol (CBD) products with THC content of
      0.3% or less are allowed only if the advertiser applies to advertise these
      CBD products and targets only California, Colorado, and Puerto Rico; some ad
      formats have additional restrictions. Other CBD-based products (supplements,
      food additives, inhalants) remain disallowed.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2023-01-20
    version: "adspolicy-cbd-2023"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [drugs]
    evidence:
      quote: >-
        Ads for topical, hemp-derived cannabidiol (CBD) products with THC content
        of 0.3% or less are allowed. Advertisers must apply to advertise these CBD
        products and only target California, Colorado, and Puerto Rico. Some ad
        formats may have additional restrictions for promotion of CBD products.
      source_url: https://support.google.com/adspolicy/answer/6014299
      section: "Dangerous products or services > Recreational drugs > CBD"
      retrieved_at: 2026-06-27

rules:
  - id: google_unreliable_claims
    canonical_id: misleading.exaggerated_results
    clause_ids: [google.misrep.unreliable_claims]
    category_id: misleading
    severity: high
    modalities: [text, image, video, landing_page]
    priority: 60
    detection: >
      Inaccurate or improbable results presented as the likely outcome a user
      can expect.
    exceptions:
      - "Typical, substantiated results clearly presented as such."
    status: active

  - id: google_unacceptable_business_practices
    canonical_id: misleading.false_affiliation_or_endorsement
    clause_ids: [google.misrep.unacceptable_business_practices, google.misrep.misleading_representation]
    category_id: misleading
    severity: high
    modalities: [text, image, video, landing_page]
    priority: 70
    detection: >
      Implying support/affiliation with a brand, org, or government entity when
      false; impersonation; misrepresenting identity or qualifications.
    exceptions:
      - "Documented, authorized affiliations and endorsements."
    status: active

  - id: google_pricing_and_offers
    canonical_id: misleading.missing_or_inconsistent_material_info
    clause_ids: [google.misrep.dishonest_pricing, google.misrep.unavailable_offers]
    category_id: misleading
    severity: medium
    modalities: [text, landing_page]
    priority: 55
    detection: >
      Omitting material pricing info, hidden/unexpected charges, or promoting
      offers unavailable from the destination.
    exceptions:
      - "Full cost and offer terms clearly and conspicuously disclosed."
    status: active

  - id: google_clickbait_and_ad_design
    canonical_id: misleading.clickbait_or_fake_ui
    clause_ids: [google.misrep.clickbait_ads, google.misrep.misleading_ad_design]
    category_id: misleading
    severity: medium
    modalities: [text, image, video, landing_page]
    priority: 55
    detection: >
      Clickbait/sensationalist tactics; fake UI elements (buttons, fields, alerts)
      or ads not clearly identifiable as ads.
    exceptions: []
    status: active

  - id: google_manipulated_media
    canonical_id: misleading.before_after_distortion
    clause_ids: [google.misrep.manipulated_media]
    category_id: misleading
    severity: high
    modalities: [image, video]
    priority: 55
    detection: >
      Media manipulated to deceive, defraud, or mislead (incl. fabricated
      transformations/effects).
    exceptions: []
    status: active

