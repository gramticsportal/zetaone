- canonical_id: privacy.sensitive_attribute_targeting_prohibited
  category_id: privacy
  severity: high
  review_status: approved
  source_rule_ids:
  - google_privacy_sensitive_categories
  - linkedin_privacy_sensitive_targeting
  - meta_privacy_personal_attributes
  source_files:
  - google_ads_us.yaml
  - linkedin_ads_us.yaml
  - meta_ads_us.yaml
  clause_ids:
  - google.privacy.sensitive_interest_categories
  - linkedin.privacy.sensitive_data_targeting
  - meta.privacy.personal_attributes
  modalities:
  - text
  - image
  - video
  - landing_page
  detection_summaries:
  - use of advertiser-curated audiences (customer match, remarketing, lookalike, custom segments) to target
    sensitive interest categories (health, sexual orientation, race, religion, financial hardship, etc.).
  - 'targeting based on sensitive data/categories: political opinion, race/ ethnicity, health, genetic/biometric
    data, religion, criminal record, sexual orientation, trade union membership, or income.'
  - ad copy or targeting that asserts or implies a person's sensitive personal attributes (race, religion,
    health, sexual orientation, financial status, etc.), incl. "are you...?" / "people like you" phrasing.
  forbidden_terms:
  - advertiser-curated
  - customer
  - match
  - remarketing
  - lookalike
  - custom
  - segments
  - sensitive
  - interest
  - categories
  - health
  - sexual
  - fall
  - within
  - unable
  - data
  - political
  - opinion
  forbidden_phrases:
  - sell your data
  - opt out
  - personal information
  - data collection
  forbidden_patterns:
  - pattern: \bsell(?:s|ing)?\s+(your\s+)?(data|personal\s+information)\b
    confidence: 0.85
    note: data sale
  requires_context:
    terms:
    - privacy
    - data
    - tracking
    - personal information
    note: 'Gate: prefer match when context terms appear near hit'
  exceptions:
    terms:
    - predefined google audiences (sensitive signals excluded).
    - benefit-focused copy that does not imply the viewer has an attribute.
    - psas that don't assert a person/family has a condition.
    - results may vary
    - for entertainment
    - informational only
    - no real money
    phrases: []
    patterns: []
    notes:
    - Predefined Google audiences (sensitive signals excluded).
    - Benefit-focused copy that does not imply the viewer has an attribute.
    - PSAs that don't assert a person/family has a condition.
