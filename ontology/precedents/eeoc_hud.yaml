  source: U.S. Equal Employment Opportunity Commission
  source_url: https://www.eeoc.gov/newsroom/eeoc-meta-platforms-pay-22-million-settle-discrimination-charges
  date: 2023-05-05
  title: EEOC v. Meta — age discrimination in job advertising (Settlement)
  summary: 'The EEOC resolved charges that Meta violated the Age Discrimination in Employment Act by denying older workers job opportunities through its employment advertising and recruitment practices. Meta agreed to pay $22 million into a settlement fund for eligible class members.

    '
