  # ===================== Intellectual Property / Counterfeit =====================
  - id: tiktok.ip.counterfeit_goods
    source_id: tiktok_ads_us
    category_id: ip_trademark
    text: >
      Counterfeiting is dealing in goods under a trademark that is identical to
      or substantially similar to a registered trademark, without the trademark
      owner's permission. TikTok does not permit the purchase, sale, trade,
      promotion, or solicitation of counterfeit goods, and will remove such
      content.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "ip-policy-counterfeiting"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [all]
    evidence:
      quote: >-
        Counterfeiting is the illegal manufacturing, importing and exporting,
        distributing, selling, facilitating the trade of, or otherwise dealing in
        goods under a trademark that is identical to or substantially similar to a
        registered trademark, without the trademark owner's permission ... we do
        not permit the purchase, sale, trade, promotion, or solicitation of
        counterfeit goods on TikTok, and will remove such content.
      source_url: https://www.tiktok.com/legal/copyright-policy
      section: "Intellectual Property Policy > Counterfeiting"
      retrieved_at: 2026-06-27

  - id: tiktok.ip.infringement
    source_id: tiktok_ads_us
    category_id: ip_trademark
    text: >
      TikTok does not allow content that violates or infringes someone else's
      intellectual property rights, including copyright and trademark.
      Advertisers must hold all necessary rights, licenses, and permissions for
      content used in their advertisements.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "ip-policy"
    status: active
    last_verified_at: 2026-06-27
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [all]
    evidence:
      quote: >-
        TikTok respects the intellectual property rights of others and requires
        compliance with the Terms of Service and Community Guidelines which do
        not allow content that violates or infringes someone else's intellectual
        property rights, including copyright and trademark.
      source_url: https://www.tiktok.com/legal/copyright-policy
      section: "Intellectual Property Policy"
      retrieved_at: 2026-06-27

rules:
  - id: tiktok_absolute_terms
    canonical_id: misleading.guaranteed_outcomes
    clause_ids: [tiktok.misleading.absolute_terms]
    category_id: misleading
    severity: high
    modalities: [text, image, video, landing_page]
    priority: 60
    detection: >
      Absolute/guaranteed terms about results, time, region, or brand
      (e.g. "right away", "in 10 seconds").
    exceptions:
      - "Qualified claims with realistic framing and disclaimers."
    status: active

  - id: tiktok_unsubstantiated_claims
    canonical_id: misleading.unsubstantiated_objective_claims
    clause_ids: [tiktok.misleading.unsubstantiated_claims]
    category_id: misleading
    severity: high
    modalities: [text, image, video, landing_page]
    priority: 60
    detection: >
      Objective product-effect claims that are not realistic or substantiated by
      evidence; AI-exaggerated effects.
    exceptions:
      - "Claims substantiated with competent and reliable evidence."
    status: active

  - id: tiktok_before_after
    canonical_id: misleading.before_after_distortion
    clause_ids: [tiktok.misleading.before_after]
    category_id: misleading
    severity: high
    modalities: [image, video]
    priority: 60
    detection: >
      Before-and-after transformation imagery in paid ads.
    exceptions: []
    status: active

  - id: tiktok_landing_page_consistency
    canonical_id: misleading.missing_or_inconsistent_material_info
    clause_ids: [tiktok.misleading.landing_page_consistency]
    category_id: misleading
    severity: medium
    modalities: [landing_page]
    priority: 55
    detection: >
      Inconsistency between ad creative and landing page (stronger claims/
      guarantees on the destination).
    exceptions:
      - "Ad and landing page claims consistent and substantiated."
    status: active

