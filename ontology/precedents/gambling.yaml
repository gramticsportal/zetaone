# NJ DGE and state gambling advertising enforcement.

precedents:
  - precedent_id: prec.njdge.draftkings_self_excluded_2021
    source: "New Jersey Division of Gaming Enforcement"
    source_url: "https://www.nj.gov/oag/ge/docs/Rulings/2021/feb16_28/B_7_dk_market.pdf"
    date: 2021-02-24
    title: "NJ DGE v. DraftKings — marketing to self-excluded patrons"
    summary: >
      DraftKings agreed to a $500 civil penalty after NJ DGE found it sent
      promotional materials to self-excluded and cooled-off patrons in violation
      of N.J.A.C. 13:69G-2.4(a)4.
    why_this_matters: >
      State gambling regulator penalty for sportsbook marketing to self-excluded
      consumers — core responsible-gambling ad compliance.
    retrieval_keywords: ['DraftKings', 'New Jersey', 'self-exclusion', 'sports betting', 'DGE', 'responsible gambling', 'marketing']
    confidence: verified
    last_verified_at: 2026-06-27
    category_ids: ['gambling', 'misleading']
    violated_clause_ids:
      - google.gambling.responsible
      - meta.gambling.authorization_and_license
    canonical_ids:
      - gambling.responsible_gambling_required
      - gambling.realmoney_requires_license_and_authorization
    outcome: fine
    monetary_relief: "$500"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          The Division having sent a Notice of Violation to DraftKings Inc. on
          February 12, 2021 imposing a $500 civil penalty for marketing to self-
          excluded and cooled-off patrons in violation of a Division requirement, in
          violation of N.J.A.C. 13:69G-2.4(a)4.
        source_url: https://www.nj.gov/oag/ge/docs/Rulings/2021/feb16_28/B_7_dk_market.pdf
        section: "NJ DGE Order, File Nos. D-01-20-186"

  - precedent_id: prec.njdge.draftkings_self_excluded_mail_2021
    source: "New Jersey Division of Gaming Enforcement"
    source_url: "https://www.nj.gov/oag/ge/docs/Rulings/2021/mar16_31/b11_draftkings.pdf"
    date: 2021-03-01
    title: "NJ DGE v. DraftKings — promotional mailings to eleven self-excluded individuals"
    summary: >
      DraftKings paid a $10,000 civil penalty after NJ DGE found it sent
      promotional mailings to eleven self-excluded individuals in violation of
      N.J.A.C. 13:69G-2.4(b)1.
    why_this_matters: >
      Escalated NJ penalty for repeat self-exclusion marketing failures via direct
      mail.
