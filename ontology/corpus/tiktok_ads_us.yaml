  # ===================== Alcohol / Tobacco / Cannabis =====================
  - id: tiktok.atc.tobacco
    source_id: tiktok_ads_us
    category_id: drugs
    text: >
      TikTok does not allow ad content and landing pages to show, promote, or
      sell tobacco, nicotine, or related products — including cigarettes, cigars,
      e-cigarettes, vape pens or vape oils and cartridges, smoking paraphernalia
      (pipes, rolling papers, filters, vaporizers, nicotine pouches), or venues
      for smoking such as cigar bars and hookah lounges.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08-dangerous-products"
