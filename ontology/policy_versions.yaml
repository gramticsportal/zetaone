# Policy metadata registry — SIDECAR, not part of the frozen schema (v1.0.0).
# Purpose: capture, per official source/policy, the version + effective date +
# last-updated date + deprecated/superseded status + officially published change
# history, so we can later answer "what changed?" across policy versions.
#
# Keyed by `source_id` (same id used in corpus/*.yaml). A single source may have
# multiple policy entries (disambiguated by `policy_title`). Populate fields ONLY
# when officially published; omit (rather than invent) anything not stated on the
# source. `status`: active | deprecated | superseded. Dates are ISO (YYYY-MM-DD)
# when published, or a coarser string (e.g. "2025-08") when the source only gives
# month/year. `retrieved_at` records when we last read the page.

policies:
  # ----------------------------- Regulators -----------------------------
  - source_id: ftc_us
    policy_title: "Children's Online Privacy Protection Rule (COPPA), 16 CFR Part 312"
    url: https://www.law.cornell.edu/cfr/text/16/part-312
    policy_version: "2025 amended final rule"
    effective_date: 2025-06-23
    last_updated: 2025-04-22        # amended rule full-compliance deadline (see change_history)
    status: active
    superseded_by: null
    retrieved_at: 2026-06-27
    change_history:
      - date: 2013-07-01
        version: "2013 rule"
        summary: "Prior COPPA Rule in effect (expanded definition of personal information to include persistent identifiers, geolocation, photos/video/audio)."
        url: https://www.ftc.gov/legal-library/browse/rules/childrens-online-privacy-protection-rule-coppa
      - date: 2025-01-16
        version: "2025 amended final rule"
        summary: "FTC published amended COPPA Rule: separate verifiable parental consent required before disclosing children's personal information to third parties for targeted advertising; new data-security, retention, and deletion requirements."
        url: https://www.ftc.gov/news-events/news/press-releases/2025/01/ftc-finalizes-changes-childrens-privacy-rule-limiting-companies-ability-monetize-kids-data
      - date: 2026-02-25
        version: "enforcement policy statement"
        summary: "FTC policy statement limiting enforcement when mixed/general-audience services collect children's data solely to verify user age, subject to safeguards."
        url: https://www.ftc.gov/legal-library/browse/cases-proceedings/public-statements
      - date: 2026-04-22
        version: "2025 amended final rule"
        summary: "Amended Rule took full effect; active enforcement exposure begins for in-scope operators."
        url: https://www.ftc.gov/business-guidance/privacy-security/childrens-privacy

  # ----------------------------- Platforms ------------------------------
  - source_id: meta_ads_us
    policy_title: "Meta Advertising Standards (incl. ads to teens / SIEP)"
    url: https://transparency.meta.com/policies/ad-standards/
    policy_version: null            # Meta does not publish a numeric ad-standards version
    effective_date: null
    last_updated: null
    status: active
    superseded_by: null
    retrieved_at: 2026-06-27
    change_history:
      - date: 2021-07-27
        version: "teen-targeting update"
        summary: "Restricted advertiser targeting of under-18s to age, gender, and location (removed interest/activity-based targeting)."
        url: https://about.fb.com/news/2021/07/protecting-young-people/
      - date: 2023-02-01
        version: "teen-targeting update"
        summary: "Removed gender as a targeting option for teens; teen on/off-app engagement no longer informs ads — only age and location used to reach teens."
        url: https://about.fb.com/news/2023/01/age-appropriate-ads-for-teens/
      - date: 2023-11-01
        version: "EU/EEA/CH delivery restriction"
        summary: "Ads with locations in the EU, EEA, or Switzerland can no longer deliver to audiences under 18."
        url: https://www.facebook.com/business/help/229435355723442

  - source_id: google_ads_us
    policy_title: "Google Ads — Ad-serving protections for children and teens"
    url: https://support.google.com/adspolicy/answer/15416897
    policy_version: null
    effective_date: null
    last_updated: null
    status: active
    superseded_by: null
    retrieved_at: 2026-06-27
    change_history:
      - date: 2021-08-15
        version: "under-18 personalized-ads restriction"
        summary: "Users under 18 made ineligible for personalized advertising; sensitive ad categories restricted for minors."
        url: https://blog.google/technology/families/giving-kids-and-teens-safer-experience-online/

  - source_id: tiktok_ads_us
    policy_title: "TikTok Advertising Policies"
    url: https://ads.tiktok.com/help/article/tiktok-advertising-policies
    policy_version: null
    effective_date: null
    last_updated: 2025-08          # page states "Last updated: August 2025"
    status: active
    superseded_by: null
    retrieved_at: 2026-06-27
    change_history:
      - date: 2023-07-11
        version: "teen personalized-ads restriction"
        summary: "US users 13–15 no longer shown personalized ads based on off-TikTok activity; EEA/UK/Switzerland users 13–17 no longer shown personalized ads based on on- or off-TikTok activity."
        url: https://www.tiktok.com/business/en-US/blog/privacy-updates-improved-data-control-transparency-tools
      - date: 2025-04
        version: "Age Targeting Restrictions"
        summary: "Age Targeting Restrictions article last updated (per-market under-18 targeting limits)."
        url: https://ads.tiktok.com/help/article/age-targeting-restrictions
      - date: 2025-07-25
        version: "Branded Content Policy update"
        summary: "Branded Content Policy revised: new Prohibited Industries sub-sections and a Restricted Industries & Products section with age restrictions."
        url: https://www.tiktok.com/legal/page/global/bc-policy/en
      - date: 2025-08
        version: "Advertising Policies refresh"
        summary: "TikTok Advertising Policies index last updated (August 2025)."
        url: https://ads.tiktok.com/help/article/tiktok-advertising-policies
