        To advertise gambling services, you must go through our certification
        process. ... Our certification process requires you to provide documents
        that prove your licenses and legal compliance in your target market. ...
        Gambling ads are only allowed in specified markets where gambling is legal
        and when all local certifications and requirements are met. ... [Not
