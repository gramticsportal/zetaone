      source_url: https://support.google.com/adspolicy/answer/176031
      section: "Healthcare and medicines > Prescription opioid painkillers"
      retrieved_at: 2026-06-24

  - id: google.health.speculative_experimental
    source_id: google_ads_us
    category_id: health
    text: >
      Promotion of speculative and/or experimental medical treatments is not
      allowed. Promotion of cell or gene therapies is not allowed except, in the
      United States, FDA licensed or approved therapies by entities holding the
      relevant FDA license or approval.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-healthcare-medicines"
    status: active
    last_verified_at: 2026-06-24
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [health]
    evidence:
      quote: >-
        Except as provided below in relation to the promotion of cell or gene
        therapies in the United States, the following isn't allowed: Promotion
        of speculative and/or experimental medical treatments. Promotion of cell
        or gene therapies, subject to the exception below.
      source_url: https://support.google.com/adspolicy/answer/176031
      section: "Healthcare and medicines > Speculative and experimental medical treatment, cell therapies, and gene therapies"
      retrieved_at: 2026-06-24

  - id: google.health.clinical_trials
    source_id: google_ads_us
    category_id: health
    text: >
      Where promotion of clinical trial recruitment is allowed, promotions may
      not create misleading expectations or effects of a product being tested,
      and may not imply that the products being tested are safe.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-healthcare-medicines"
    status: active
    last_verified_at: 2026-06-24
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [health]
    evidence:
