  - id: google.misrep.unacceptable_business_practices
    source_id: google_ads_us
    category_id: misleading
    text: >
      Scamming users by hiding or misrepresenting information about your
      business, products or services is not allowed. This includes making it
      seem like you're supported by another brand, organization or government
      entity when you're not; offering products or services you don't have or
      can't deliver; lying about services that could put health or safety at
      risk; and impersonating other brands or businesses.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
