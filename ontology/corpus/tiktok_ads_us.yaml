  - id: tiktok.misleading.unsubstantiated_claims
    source_id: tiktok_ads_us
    category_id: misleading
    text: >
      All claims made in ad creatives must be responsible, true, realistic, and
      substantiated with evidence. AI must not be used to make a product look
      more powerful or effective than it really is, including exaggerated effects
      or unrealistic instant changes.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2025-08-01
    version: "2025-08"
    status: active
    last_verified_at: 2026-06-24
