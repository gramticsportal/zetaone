precedents:
- precedent_id: prec.ftc.lumosity_brain_training_2016
  source: U.S. Federal Trade Commission
  source_url: https://www.ftc.gov/news-events/news/press-releases/2016/01/lumosity-pay-2-million-settle-ftc-deceptive-advertising-charges
  date: 2016-01-05
  title: FTC v. Lumos Labs (Lumosity) — deceptive brain-training claims
  summary: 'The FTC charged Lumos Labs with deceiving consumers with unfounded claims that Lumosity games could help users perform better at work and school and reduce cognitive impairment. Lumosity agreed to pay $2 million and to stop making deceptive brain-performance claims without competent and reliable scientific evidence.

    '
  category_ids:
  - health
  - misleading
  violated_clause_ids:
  - ftc.health.truthful_substantiated
  - ftc.misleading.reasonable_basis
  canonical_ids:
  - health.unsubstantiated_health_claims
  - misleading.unsubstantiated_objective_claims
  outcome: settlement
  monetary_relief: $2,000,000
  status: final
  jurisdiction: US
  retrieved_at: 2026-06-27
  evidence:
  - quote: Lumosity preyed on consumers' fears about age-related cognitive decline, suggesting their games could stave off memory loss, dementia, and even Alzheimer's disease. But Lumosity simply did not have the science to back up its ads.
    source_url: https://www.ftc.gov/news-events/news/press-releases/2016/01/lumosity-pay-2-million-settle-ftc-deceptive-advertising-charges
    section: FTC Press Release, Jan 5, 2016
  why_this_matters: Landmark brain-training health-claim case requiring competent scientific evidence.
  retrieval_keywords:
  - Lumosity
  - brain training
  - health claims
  - cognitive
  - FTC
  confidence: verified
  last_verified_at: '2026-06-27'
- precedent_id: prec.ftc.volkswagen_clean_diesel_2016
  source: U.S. Federal Trade Commission
  source_url: https://www.ftc.gov/news-events/news/press-releases/2016/03/volkswagen-agree-pay-more-14-billion-settle-ftc-allegations-it-deceived
  date: 2016-03-29
  title: FTC v. Volkswagen — 'clean diesel' deceptive environmental claims
  summary: 'The FTC alleged Volkswagen deceived consumers with ads promoting "clean" diesel vehicles equipped with illegal defeat devices that masked high emissions. VW agreed to provide more than $14 billion in restitution and buyback/lease-termination relief under the settlement framework announced with federal and state authorities.

    '
  category_ids:
  - misleading
  violated_clause_ids:
  - ftc.misleading.reasonable_basis
  - ftc.misleading.express_implied
  canonical_ids:
  - misleading.unsubstantiated_objective_claims
  outcome: settlement
  monetary_relief: '>$14,000,000,000 consumer redress framework (multi-agency)'
  status: final
  jurisdiction: US
  retrieved_at: 2026-06-27
  evidence:
  - quote: For years Volkswagen's ads touted the company's 'Clean Diesel' cars even though it now appears Volkswagen engineered the cars with defeat devices that purposely masked the cars' high emissions during government tests.
    source_url: https://www.ftc.gov/news-events/news/press-releases/2016/03/volkswagen-agree-pay-more-14-billion-settle-ftc-allegations-it-deceived
    section: FTC Press Release, March 29, 2016
  why_this_matters: Massive environmental deception precedent for objective product performance claims.
  retrieval_keywords:
  - Volkswagen
  - clean diesel
  - deceptive advertising
  - emissions
  - FTC
  confidence: verified
  last_verified_at: '2026-06-27'
- precedent_id: prec.ftc.credit_karma_preapproved_2023
  source: U.S. Federal Trade Commission
  source_url: https://www.ftc.gov/news-events/news/press-releases/2023/09/ftc-takes-action-against-credit-karma-tricking-consumers-allegedly-pre-approved-credit-offers
  date: 2023-09-01
  title: FTC v. Credit Karma — deceptive 'pre-approved' credit offers
  summary: 'The FTC charged Credit Karma with deploying dark patterns to falsely tell consumers they were "pre-approved" for credit cards when they were not, wasting time and harming credit scores with unnecessary hard inquiries. Credit Karma agreed to pay $3 million to the FTC.

    '
  category_ids:
  - financial
  - misleading
  violated_clause_ids:
  - ftc.misleading.reasonable_basis
  canonical_ids:
  - finance.misleading_or_unbalanced_claims
  - misleading.unsubstantiated_objective_claims
  outcome: settlement
  monetary_relief: $3,000,000
  status: final
  jurisdiction: US
  retrieved_at: 2026-06-27
  evidence:
  - quote: Credit Karma knew that its 'pre-approved' offers were false or had a high likelihood of being false, but continued to use them anyway.
    source_url: https://www.ftc.gov/news-events/news/press-releases/2023/09/ftc-takes-action-against-credit-karma-tricking-consumers-allegedly-pre-approved-credit-offers
    section: FTC Press Release, Sept 1, 2023
  why_this_matters: Dark-pattern finance ad case on false 'pre-approved' credit offers.
  retrieval_keywords:
  - Credit Karma
  - pre-approved
  - dark patterns
  - credit cards
  - FTC
  confidence: verified
  last_verified_at: '2026-06-27'
- precedent_id: prec.ftc.walmart_made_in_usa_2022
  source: U.S. Federal Trade Commission
  source_url: https://www.ftc.gov/news-events/news/press-releases/2022/06/ftc-takes-action-against-walmart-and-sam-club-deceiving-shoppers-over-made-usa-claims
  date: 2022-06-28
  title: FTC v. Walmart — deceptive Made in USA claims
  summary: 'The FTC charged Walmart with misleading consumers by marketing certain products as "Made in USA" when they were wholly imported or contained negligible U.S. content. Walmart agreed to pay $3 million and to stop making unqualified U.S.-origin claims without substantiation.

    '
  category_ids:
  - misleading
  violated_clause_ids:
  - ftc.misleading.reasonable_basis
  canonical_ids:
  - misleading.unsubstantiated_objective_claims
  outcome: settlement
  monetary_relief: $3,000,000
  status: final
  jurisdiction: US
  retrieved_at: 2026-06-27
  evidence:
  - quote: Walmart violated the FTC Act by falsely marketing dozens of products as Made in USA when they were wholly imported or contained only negligible U.S. content.
    source_url: https://www.ftc.gov/news-events/news/press-releases/2022/06/ftc-takes-action-against-walmart-and-sam-club-deceiving-shoppers-over-made-usa-claims
    section: FTC Press Release, June 28, 2022
  why_this_matters: Made in USA origin-claim enforcement applicable to product marketing ads.
  retrieval_keywords:
  - Walmart
  - Made in USA
  - origin claims
  - deceptive advertising
  - FTC
  confidence: verified
  last_verified_at: '2026-06-27'
