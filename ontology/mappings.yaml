# Cross-source mappings — the differentiator.
# Collapse equivalent platform + regulator clauses into one canonical_id per category.
# Conforms to entities.mapping in ontology/schema.yaml.
#
# Misleading / Deceptive vertical canonical rules:
#   misleading.exaggerated_results
#   misleading.guaranteed_outcomes
#   misleading.unsubstantiated_objective_claims
#   misleading.missing_or_inconsistent_material_info
#   misleading.false_affiliation_or_endorsement
#   misleading.clickbait_or_fake_ui
#   misleading.before_after_distortion

mappings:
  - canonical_id: misleading.exaggerated_results
    category_id: misleading
    clause_ids:
      - meta.misleading.deceptive_practices
      - meta.misleading.exaggerated_success_claims
      - google.misrep.unreliable_claims
    relation: related
    confidence: high
    note: >
      Meta prohibits exaggerated success claims; Google prohibits improbable
      results presented as the likely outcome. FTC substantiation (separate
      canonical) backs both.

  - canonical_id: misleading.guaranteed_outcomes
    category_id: misleading
    clause_ids:
      - meta.misleading.health_results_timing
      - tiktok.misleading.absolute_terms
    relation: related
    confidence: high
    note: >
      Guaranteed/absolute outcomes in a specific time without disclaimer (Meta:
      health results timing; TikTok: absolute terms like "right away").

  - canonical_id: misleading.unsubstantiated_objective_claims
    category_id: misleading
    clause_ids:
      - ftc.misleading.reasonable_basis
      - ftc.misleading.express_implied
      - tiktok.misleading.unsubstantiated_claims
    relation: stricter
    confidence: high
    note: >
      FTC reasonable-basis doctrine is the regulatory backbone and is stricter /
      higher-precedence; TikTok requires claims be realistic and substantiated.

  - canonical_id: misleading.missing_or_inconsistent_material_info
    category_id: misleading
    clause_ids:
      - google.misrep.dishonest_pricing
      - google.misrep.unavailable_offers
      - tiktok.misleading.landing_page_consistency
    relation: related
    confidence: medium
    note: >
      Omitted/inconsistent material info: Google pricing + unavailable offers;
      TikTok ad-vs-landing-page consistency. Overlapping but not identical scope.

  - canonical_id: misleading.false_affiliation_or_endorsement
    category_id: misleading
    clause_ids:
      - meta.misleading.famous_person_baiting
      - meta.misleading.misrepresent_entity
      - google.misrep.unacceptable_business_practices
      - google.misrep.misleading_representation
    relation: equivalent
    confidence: high
    note: >
      False affiliation/endorsement/impersonation: Meta (famous-person bait,
      misrepresenting entities) and Google (unacceptable business practices,
      misleading representation).

  - canonical_id: misleading.clickbait_or_fake_ui
    category_id: misleading
    clause_ids:
      - google.misrep.clickbait_ads
      - google.misrep.misleading_ad_design
    relation: related
    confidence: high
    note: >
      Clickbait tactics and fake-UI / non-identifiable ad design. Google is the
      most explicit source; Meta/TikTok cover via deceptive-practices clauses.

  - canonical_id: misleading.before_after_distortion
    category_id: misleading
    clause_ids:
      - meta.misleading.before_after_weightloss
      - google.misrep.manipulated_media
      - tiktok.misleading.before_after
    relation: related
    confidence: high
    note: >
      Before-and-after / manipulated transformation imagery. TikTok bans broadly;
      Meta restricts weight-loss before/after; Google prohibits manipulated media.

  # =========================================================================
  # Health / Medical vertical canonical rules:
  #   health.disease_cure_treatment_claims          (Meta, Google, FTC, FDA)
  #   health.unsubstantiated_health_claims          (FTC, FDA, Google)
  #   health.prescription_drug_promotion_restricted (Google, TikTok)
  #   health.unapproved_or_dangerous_products       (Google, TikTok)
  #   health.negative_self_perception_body_image    (Meta-only — no cross-source mapping yet)
  #   health.rx_fair_balance_risk_disclosure        (FDA-only — no cross-source mapping yet)
  #   health.health_privacy_sensitive_attributes    (Meta-only — no cross-source mapping yet)
  #   health.material_risk_safety_disclosure        (FTC-only — no cross-source mapping yet)
  # =========================================================================
  - canonical_id: health.disease_cure_treatment_claims
    category_id: health
    clause_ids:
      - meta.health.disease_cure_claims
      - google.health.unapproved_substances
      - ftc.health.disease_implication
      - fda.health.disease_claims
    relation: stricter
    confidence: high
    note: >
      Disease cure/treatment claims. FDA/FTC (regulators) are the stricter,
      higher-precedence backbone; platforms prohibit cure claims for incurable
      disease (Meta) and disease implications by unapproved products (Google).

  - canonical_id: health.unsubstantiated_health_claims
    category_id: health
    clause_ids:
      - ftc.health.truthful_substantiated
      - fda.health.benefits_approved_use
      - google.health.clinical_trials
    relation: stricter
    confidence: high
    note: >
      Health benefit claims require competent and reliable scientific evidence
      (FTC); drug benefits limited to FDA-approved use (FDA); clinical-trial
      promos must not imply safety/efficacy (Google).

  - canonical_id: health.prescription_drug_promotion_restricted
    category_id: health
    clause_ids:
      - google.health.unauthorized_pharmacies
      - google.health.prescription_drug_services
      - tiktok.health.overview
      - tiktok.health.prescription_us
      - tiktok.health.otc_us
      - tiktok.health.pharmacies_us
    relation: related
    confidence: high
    note: >
      Prescription-drug/pharmacy promotion is restricted/gated: Google requires
      certification/application and bans unauthorized pharmacies; TikTok (US)
      allows Rx/OTC/pharmacy only with FDA / NABP / LegitScript certification and
      18+ targeting.

  - canonical_id: health.unapproved_or_dangerous_products
    category_id: health
    clause_ids:
      - google.health.unapproved_substances
      - google.health.opioid_painkillers
      - google.health.speculative_experimental
      - tiktok.health.cbd_us
    relation: related
    confidence: medium
    note: >
      Unapproved/dangerous or tightly restricted products: Google (unapproved
      substances, opioids, experimental treatments); TikTok (CBD, allowed only
      within a narrow topical-hemp <0.3% THC exception). Overlapping, not
      identical, scope.

  # =========================================================================
  # Financial services & investments vertical canonical rules:
  #   finance.prohibited_predatory_products      (Meta, Google, TikTok, LinkedIn)
  #   finance.guaranteed_returns_or_risk_free     (TikTok, LinkedIn, FINRA, FTC)
  #   finance.misleading_or_unbalanced_claims     (LinkedIn, FINRA, SEC)
  #   finance.performance_claims_substantiation   (FINRA, SEC, FTC)
  #   finance.required_cost_and_risk_disclosures  (Google, CFPB, TikTok, Meta)
  #   finance.credit_advertising_trigger_terms    (CFPB, Google)
  #   finance.licensing_registration_required     (Meta, Google, TikTok, LinkedIn)
  #   finance.crypto_restricted                   (Meta, Google, TikTok)
  #   finance.loan_modification_foreclosure_restricted (Google, LinkedIn, CFPB)
  #   finance.mortgage_advertising_prohibited_acts (CFPB-only — no cross-source mapping yet)
  #   finance.testimonials_endorsements_disclosure (SEC-only — no cross-source mapping yet)
  # US jurisdiction only. Regulator clauses carry higher priority on conflict.
  # =========================================================================
  - canonical_id: finance.prohibited_predatory_products
    category_id: financial
    clause_ids:
      - meta.finance.prohibited_products
      - google.finance.binary_options
      - google.finance.credit_repair
      - google.finance.high_apr_us
      - google.finance.complex_speculative
      - tiktok.finance.us_prohibited
      - linkedin.finance.prohibited
    relation: related
    confidence: high
    note: >
      Predatory / high-risk financial products banned across platforms: payday &
      short-term loans, binary options, CFDs/spread betting, penny auctions,
      penny stocks, credit repair, ICOs, bail bonds. Overlapping prohibited lists
      with slightly different membership per platform.

  - canonical_id: finance.guaranteed_returns_or_risk_free
    category_id: financial
    clause_ids:
      - tiktok.finance.prohibited_general
      - linkedin.finance.prohibited
      - finra.finance.no_performance_projection
      - ftc.finance.earnings_claims
    relation: stricter
    confidence: high
    note: >
      Guaranteed/risk-free returns and get-rich-quick claims: TikTok bans
      get-rich-quick/too-good-to-be-true; LinkedIn bans services guaranteeing
      financial return; FINRA bars promissory/exaggerated forecasts; FTC treats
      risk-free/profit misrepresentations as deceptive. Regulators are stricter /
      higher-precedence.

  - canonical_id: finance.misleading_or_unbalanced_claims
    category_id: financial
    clause_ids:
      - linkedin.finance.requirements
      - finra.finance.fair_balanced
      - sec.finance.untrue_or_unbalanced
    relation: stricter
    confidence: high
    note: >
      Fair, balanced, non-misleading financial communications: LinkedIn (avoid
      misleading/deceptive/unsupported claims); FINRA 2210 (fair and balanced,
      no false/exaggerated claims); SEC marketing rule (no untrue/omitted
      material facts; balanced risk vs benefit). SEC/FINRA carry higher priority.

  - canonical_id: finance.performance_claims_substantiation
    category_id: financial
    clause_ids:
      - finra.finance.no_performance_projection
      - sec.finance.performance_fair_balanced
      - ftc.finance.earnings_claims
    relation: stricter
    confidence: high
    note: >
      Performance/earnings claims must be substantiated and fairly balanced:
      FINRA bars performance prediction/projection; SEC requires fair-and-balanced
      performance presentation; FTC requires reasonable basis + written
      substantiation for earnings claims. Regulator-only backbone.

  - canonical_id: finance.required_cost_and_risk_disclosures
    category_id: financial
    clause_ids:
      - google.finance.disclosures
      - cfpb.finance.actually_available_terms
      - tiktok.finance.us_allowed
      - meta.finance.licensing_disclosure
    relation: related
    confidence: medium
    note: >
      Clear, conspicuous cost/risk disclosures: Google (address, all fees,
      accreditation); CFPB Reg Z (clear & conspicuous, APR as such); TikTok
      (disclaimers + accreditation evidence); Meta (legally-required disclosures).
      Overlapping but not identical disclosure obligations.

  - canonical_id: finance.credit_advertising_trigger_terms
    category_id: financial
    clause_ids:
      - cfpb.finance.actually_available_terms
      - cfpb.finance.trigger_terms
      - google.finance.personal_loans
    relation: stricter
    confidence: high
    note: >
      Credit-advertising trigger terms: CFPB Reg Z (actually-available terms;
      triggering terms require downpayment/repayment/APR disclosures); Google
      personal-loans policy operationalizes the same (min/max repayment, max APR,
      representative example). CFPB is the higher-precedence regulatory source.

  - canonical_id: finance.licensing_registration_required
    category_id: financial
    clause_ids:
      - meta.finance.licensing_disclosure
      - google.finance.verification
      - tiktok.finance.requirements
      - linkedin.finance.restricted
    relation: related
    confidence: high
    note: >
      Licensing/registration & advertiser verification before promoting
      financial services: Meta (identity/authorization), Google (location-specific
      verification), TikTok (licensed by authorities, 18+), LinkedIn (restricted,
      18+). Equivalent intent; mechanics differ per platform.

  - canonical_id: finance.crypto_restricted
    category_id: financial
    clause_ids:
      - meta.finance.crypto_permission
      - google.finance.crypto
      - tiktok.finance.us_allowed
      - tiktok.finance.us_prohibited
    relation: related
    confidence: high
    note: >
      Cryptocurrency restricted/gated: Meta (prior written permission + license);
      Google (certification in limited circumstances); TikTok US (crypto/exchange
      allowed with licensing + certification + 18+, but ICOs, crypto ATMs and
      mining devices not allowed).

  - canonical_id: finance.loan_modification_foreclosure_restricted
    category_id: financial
    clause_ids:
      - google.finance.loan_modification
      - linkedin.finance.prohibited
      - cfpb.finance.mortgage_prohibited_acts
    relation: related
    confidence: medium
    note: >
      Loan-modification / foreclosure-relief restrictions: Google (no guaranteed
      modification/foreclosure prevention, no upfront fees, etc.); LinkedIn (bans
      services guaranteeing foreclosure prevention/loan modification); CFPB Reg Z
      (misleading debt-elimination claims for dwelling-secured credit). Related,
      not identical, scope.

  # =========================================================================
  # Housing & Employment (discrimination) vertical canonical rules:
  #   discrimination.discriminatory_ad_content_prohibited
  #       (Meta, TikTok, LinkedIn, HUD/FHA, EEOC/ADEA, FTC/ECOA)
  #   discrimination.restricted_targeting_protected_class
  #       (Meta, Google, TikTok, LinkedIn)
  # US jurisdiction only. Regulators (HUD/EEOC/FTC) carry higher priority on
  # conflict. Protected-class lists differ slightly by source (FHA, ADEA, Title
  # VII, ECOA), but the advertising prohibition is genuinely equivalent.
  # =========================================================================
  - canonical_id: discrimination.discriminatory_ad_content_prohibited
    category_id: discrimination
    clause_ids:
      - meta.discrimination.no_discrimination
      - tiktok.discrimination.anti_discrimination
      - linkedin.discrimination.no_discrimination
      - hud.housing.discriminatory_ad
      - eeoc.employment.discriminatory_ad
      - eeoc.employment.age_ad_adea
      - ftc.credit.ecoa_discouragement
    relation: stricter
    confidence: high
    note: >
      Ad content/notices that indicate or encourage a preference, limitation, or
      discrimination based on protected characteristics in housing, employment,
      or credit. Regulators are the higher-precedence backbone: HUD/FHA
      §3604(c) (housing), EEOC/ADEA §623(e) (employment/age), FTC ECOA/Reg B
      §1002.4(b) (credit discouragement); platforms (Meta, TikTok, LinkedIn)
      prohibit the same in their ad standards. Genuinely equivalent intent.

  - canonical_id: discrimination.restricted_targeting_protected_class
    category_id: discrimination
    clause_ids:
      - meta.discrimination.special_ad_category
      - google.discrimination.restricted_targeting
      - tiktok.discrimination.hec_targeting
      - linkedin.discrimination.targeting_certification
    relation: related
    confidence: high
    note: >
      Housing/employment/credit ads must use the platform's special-category
      mechanism and cannot target/exclude on protected demographics: Meta
      (Special Ad Category — age, gender, ZIP, exclusion, lookalike limited),
      Google (no age/gender/marital/parental/ZIP targeting in US/Canada), TikTok
      (HEC Special Ad Category Toggle), LinkedIn (gender/age certification; age
      targeting disabled for recruitment). Same intent; mechanics differ.

  # =========================================================================
  # Political & Social Issues vertical canonical rules:
  #   political.authorization_and_disclaimer_required (Meta, Google, FEC)
  #   political.paid_political_ads_prohibited          (TikTok, LinkedIn)
  #   political.synthetic_content_disclosure           (Google-only — no map yet)
  # US jurisdiction only. NOTE: platforms split into two regimes — Meta/Google
  # ALLOW political ads with authorization + "Paid for by"; TikTok/LinkedIn BAN
  # them outright. These are deliberately kept as two separate canonicals (not
  # forced into one) because the obligations are genuinely different. FEC is the
  # higher-precedence regulatory backbone for the disclaimer regime.
  # =========================================================================
  - canonical_id: political.authorization_and_disclaimer_required
    category_id: political
    clause_ids:
      - meta.political.authorization_disclaimer
      - google.political.compliance_verification
      - google.political.paid_for_by
      - fec.political.disclaimer
    relation: stricter
    confidence: high
    note: >
      Political/election/issue ads require advertiser authorization or
      verification and a clear "Paid for by" disclaimer identifying who paid:
      Meta (authorization + verified "Paid for by"), Google (election-ads
      verification + "Paid for by" disclosure + election-law/silence-period
      compliance), FEC (11 CFR 110.11 disclaimer regime). FEC is the
      higher-precedence regulatory backbone.

  - canonical_id: political.paid_political_ads_prohibited
    category_id: political
    clause_ids:
      - tiktok.political.prohibited
      - linkedin.political.prohibited
    relation: equivalent
    confidence: high
    note: >
      Outright platform bans on paid political advertising: TikTok (no paid
      political ads; no ads by political figures/entities; election info limited
      to official election authorities) and LinkedIn (political ads prohibited,
      including candidate/party/ballot/issue advocacy and fundraising).
