        immediate action are not allowed.
      source_url: https://support.google.com/adspolicy/answer/6020955
      section: "Misrepresentation > Unacceptable business practices > Clickbait ads"
      retrieved_at: 2026-06-24

  - id: google.misrep.misleading_ad_design
    source_id: google_ads_us
    category_id: misleading
    text: >
      Ads that make it difficult for the user to understand they are interacting
      with an ad are not allowed. This includes non-functional elements that
      resemble buttons or input fields, misleading icons or arrows, designs that
      mimic system notifications or dialog boxes, inconsistencies between the ad
      and the landing page, and ads that don't clearly indicate they are
      advertisements.
    modalities: [image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-misrepresentation"
    status: active
    last_verified_at: 2026-06-24
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [all]
    evidence:
      quote: >-
        Ads that make it difficult for the user to understand they are
        interacting with an ad are not allowed. This includes non-functional
        elements that resemble buttons or input fields, misleading icons or
        arrows, designs that mimic system notifications or dialog boxes,
        inconsistencies between the ad and the landing page, and ads that don't
        clearly indicate they are advertisements.
      source_url: https://support.google.com/adspolicy/answer/6020955
      section: "Misrepresentation > Unacceptable business practices > Misleading ad design"
      retrieved_at: 2026-06-24

