  - id: google.health.prescription_drug_services
    source_id: google_ads_us
    category_id: health
    text: >
      Google restricts the promotion of services related to the online
      prescribing, dispensing, and sale of prescription drugs. Advertisers must
      apply to serve ads for prescription drug services and check the
      location-specific restrictions for every location where they advertise.
    modalities: [text, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-healthcare-medicines"
    status: active
    last_verified_at: 2026-06-24
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [health]
    evidence:
      quote: >-
        Google restricts the promotion of services related to the online
        prescribing, dispensing, and sale of prescription drugs. Businesses
        subject to this policy include but aren't limited to online pharmacies
        and telemedicine providers. Advertisers must apply to serve ads for
        prescription drug services.
      source_url: https://support.google.com/adspolicy/answer/176031
      section: "Healthcare and medicines > Prescription drug services"
      retrieved_at: 2026-06-24

  - id: google.health.unapproved_substances
    source_id: google_ads_us
    category_id: health
    text: >
      Google doesn't allow the promotion of certain products regardless of any
      claims of legality, including non-government approved products marketed in
      a way that implies they're safe or effective for use in preventing,
      curing, or treating a particular disease or ailment, and products that
      imply they're as effective as prescription drugs or controlled substances.
    modalities: [text, image, video, landing_page]
    jurisdiction: [US]
    effective_date: 2024-01-01
    version: "2024-healthcare-medicines"
    status: active
    last_verified_at: 2026-06-24
    last_reviewed_by: ai
    applicability:
      countries: [US]
      audience: [all]
      industries: [health]
    evidence:
      quote: >-
        Google doesn't allow the promotion of certain products, regardless of
        any claims of legality: ... Non-government approved products that are
        marketed in a way that implies that they're safe or effective for use in
        preventing, curing, or treating a particular disease or ailment [and]
        Products that imply they're as effective as prescription drugs or
        controlled substances.
      source_url: https://support.google.com/adspolicy/answer/176031
      section: "Healthcare and medicines > Unapproved substances"
      retrieved_at: 2026-06-24

  - id: google.health.opioid_painkillers
    source_id: google_ads_us
    category_id: health
    text: >
      Google doesn't allow ads promoting or selling prescription opioid
