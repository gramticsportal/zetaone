      retrieved_at: 2026-06-24

  - id: meta.misleading.health_results_timing
    source_id: meta_ads_us
    category_id: misleading
    text: >
      Ads can't promise specific health-related results in a specific time with
      no qualifying or disclaimer language.
    modalities: [text, image, video, landing_page]
