  - eeoc.employment.discriminatory_ad
  - eeoc.employment.age_ad_adea
  - ftc.credit.ecoa_discouragement
  - tiktok.discrimination.anti_discrimination
  modalities:
  - text
  - image
  - video
  - landing_page
  detection_summaries:
  - ads promoting discriminatory hiring or denial/restriction of fair access to education, housing, credit,
    or career opportunities based on protected characteristics.
  - ad content that discriminates or encourages discrimination based on protected personal attributes,
    in housing/employment/financial contexts.
  - housing ads/notices indicating a preference, limitation, or discrimination based on race, color, religion,
    sex, handicap, familial status, or national origin (e.g. "no kids," "christians preferred," "adults
    only").
  - job ads showing preference for / discouraging applicants based on race, color, religion, sex, national
    origin, age (40+), disability, or genetic information (e.g. "young," "recent grads only," "females
    only").
  - credit advertising statements that discourage, on a prohibited basis (race, color, religion, national
    origin, sex, marital status, age), a reasonable person from applying.
  - housing/employment/credit ad content that unlawfully discriminates or excludes people based on protected
    characteristics.
  forbidden_terms:
  - discriminatory
  - hiring
  - denial
  - restriction
  - fair
  - access
  - education
  - housing
  - career
  - opportunities
  - tolerate
  - discrimination
  - personal
  - attributes
  - gender
  - identity
  - disability
  - discriminates
  forbidden_phrases:
  - whites only
  - no children
  - christians only
  - no immigrants
  - adults only
  forbidden_patterns:
  - pattern: \b(no|only)\s+(children|kids|blacks?|whites?|muslims?|christians?|immigrants?)\b
    confidence: 0.9
    note: exclusionary targeting
  requires_context:
    terms:
    - housing
    - rent
    - employment
    - hire
    - credit
    - loan
    note: 'Gate: prefer match when context terms appear near hit'
  exceptions:
    terms:
    - lawful preferences for historically disadvantaged groups where permitted.
    - lawful housing for older persons (55+/62+) communities under hopa.
    - age/other limits that are a bona fide occupational qualification (bfoq).
    - results may vary
    - for entertainment
    - informational only
    - no real money
    phrases: []
    patterns: []
    notes:
