    summary: >
      TikTok requires advertisers to complete certification before running
      gambling ads and prohibits unlicensed or illegal gambling services.
    why_this_matters: >
      TikTok gate parallel to Meta/Google for licensed sportsbook and casino
      promotions.
    retrieval_keywords: ['TikTok', 'gambling ads', 'certification', 'sports betting', 'license', 'unlicensed gambling']
