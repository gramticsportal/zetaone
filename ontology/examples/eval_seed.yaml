# Evaluation dataset seed — the real moat.
# Labeled examples linked to clauses/categories. Grow this to thousands.
# Compute precision/recall PER category_id and PER canonical_id from these.
# Conforms to entities.example in ontology/schema.yaml.

examples:
  - id: ex_0001
    content: "Miracle cure guaranteed in 7 days!"
    modality: text
    label: non_compliant
    category_ids: [misleading, health]
    violated_clause_ids:
      - meta.misleading.exaggerated_claims
      - meta.health.health_claims
      - fda.health.disease_claims
    jurisdiction: US
    labeled_by: expert
    split: test

  - id: ex_0002
