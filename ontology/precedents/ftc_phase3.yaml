    date: 2025-12-18
    title: "FTC v. Instacart — deceptive delivery fees and subscription enrollment"
    summary: >
      Instacart agreed to pay $60 million in consumer refunds to settle FTC
      charges of false 'free delivery' ads, hidden satisfaction-guarantee refund
      options, and Instacart+ enrollments without express informed consent.
    why_this_matters: >
      Major grocery-delivery case on subscription dark patterns, hidden fees, and
      satisfaction-guarantee ad claims.
    retrieval_keywords: ['Instacart', 'free delivery', 'Instacart+', 'subscription', 'ROSCA', 'dark patterns', '$60 million']
    confidence: verified
    last_verified_at: 2026-06-27
