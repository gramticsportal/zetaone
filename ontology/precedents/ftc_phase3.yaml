      - misleading.unsubstantiated_objective_claims
    outcome: settlement
    monetary_relief: "$60,000,000"
    status: final
    jurisdiction: US
    retrieved_at: 2026-06-27
    evidence:
      - quote: >-
          Today, the Federal Trade Commission announced that grocery delivery
          provider Instacart will pay $60 million in refunds to consumers to settle
          allegations that the company engaged in numerous unlawful tactics that
          harmed shoppers and raised the cost of grocery shopping for Americans.
        source_url: https://www.ftc.gov/news-events/news/press-releases/2025/12/instacart-pay-60-million-consumer-refunds-settle-ftc-lawsuit-over-allegations-it-engaged-deceptive
